  "/api/v1/organizations/{organization_id}/workspaces/{workspace_id}/automations/{automation_id}:query":
    get:
      summary: Query Automation
      description: >-
        This custom method allows explicit selection of which version stage to
        retrieve:

        - AUTOMATION_STAGE_DRAFT: Returns the latest draft version

        - AUTOMATION_STAGE_PUBLISHED: Returns the latest published version
      operationId: QueryAutomation
      responses:
        "200":
          description: A successful response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/v1Automation"
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/rpcStatus"
      parameters:
        - name: organization_id
          in: path
          required: true
          schema:
            type: string
        - name: workspace_id
          in: path
          required: true
          schema:
            type: string
        - name: automation_id
          in: path
          required: true
          schema:
            type: string
        - name: stage
          description: >-
            The publication stage of the automation to retrieve.

            Determines which version of the automation to return:

            - AUTOMATION_STAGE_DRAFT: Returns the latest draft version

            - AUTOMATION_STAGE_PUBLISHED: Returns the latest published version

             - AUTOMATION_STAGE_UNSPECIFIED: Automation stage is not specified.
             - AUTOMATION_STAGE_DRAFT: Automation is in draft stage and can be modified.
             - AUTOMATION_STAGE_PUBLISHED: Automation is published and immutable, ready for execution.
          in: query
          required: true
          schema:
            type: string
            enum:
              - AUTOMATION_STAGE_UNSPECIFIED
              - AUTOMATION_STAGE_DRAFT
              - AUTOMATION_STAGE_PUBLISHED
            default: AUTOMATION_STAGE_UNSPECIFIED
      tags:
        - Automations
  "/api/v1/organizations/{organization_id}/workspaces/{workspace_id}/automations/{automation_id}/revisions/{revision_id}":
