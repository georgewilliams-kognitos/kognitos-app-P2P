        hidden:
          type: boolean
          title: True if the book is hidden
        polls:
          type: array
          items:
            $ref: "#/components/schemas/v2BookPollDescriptor"
          title: Book polls
    bdkV2EnvironmentInformation:
      type: object
      properties:
        version:
          type: string
        runtime_name:
          type: string
          title: Runtime name
        runtime_version:
          type: string
          title: Runtime version
        bci_protocol_version:
          type: string
          title: BCI Protocol version
        api_version:
          type: string
          title: BDK API Version
        path:
          type: array
          items:
            type: string
          title: Book path under which books will be discovered
      title: Information about the environment
    v2BookProcedureDescriptor:
