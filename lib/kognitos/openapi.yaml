            Should be an IANA timezone identifier (e.g., "America/New_York", "Europe/London", "UTC").
        time_format:
          $ref: "#/components/schemas/v1TimeFormat"
        date_format:
          $ref: "#/components/schemas/v1DateFormat"
        decimal_symbol:
          $ref: "#/components/schemas/v1DecimalSymbol"
        decimal_places:
          type: integer
          format: int32
          description: The number of digits after decimal point.
        measurement_system:
          $ref: "#/components/schemas/v1MeasurementSystem"
      description: |-
        General preferences for display and formatting.
        Used by both workspace and organization preferences.
    v1TimeFormat:
      type: string
      enum:
        - TIME_FORMAT_UNSPECIFIED
        - TIME_FORMAT_12_HOUR
        - TIME_FORMAT_24_HOUR
      default: TIME_FORMAT_UNSPECIFIED
      description: |-
        Supported time formats.

         - TIME_FORMAT_UNSPECIFIED: Unspecified time format.
         - TIME_FORMAT_12_HOUR: 12-hour format (1:00 PM).
         - TIME_FORMAT_24_HOUR: 24-hour format (13:00).
    v1DateFormat:
      type: string
      enum:
        - DATE_FORMAT_UNSPECIFIED
        - DATE_FORMAT_DD_MM_YYYY_SLASH
        - DATE_FORMAT_MM_DD_YYYY_SLASH
        - DATE_FORMAT_YYYY_MM_DD_DASH
        - DATE_FORMAT_DD_MM_YYYY_DASH
        - DATE_FORMAT_MM_DD_YYYY_DASH
        - DATE_FORMAT_YYYY_MM_DD_SLASH
        - DATE_FORMAT_DD_MM_YYYY_DOT
        - DATE_FORMAT_MM_DD_YYYY_DOT
        - DATE_FORMAT_YYYY_MM_DD_DOT
        - DATE_FORMAT_DD_MMM_YYYY
        - DATE_FORMAT_MMM_DD_YYYY
        - DATE_FORMAT_DD_MMMM_YYYY
        - DATE_FORMAT_MMMM_DD_YYYY
      default: DATE_FORMAT_UNSPECIFIED
      description: >-
        Supported date formats.

         - DATE_FORMAT_UNSPECIFIED: Unspecified date format.
         - DATE_FORMAT_DD_MM_YYYY_SLASH: DD/MM/YYYY format.
         - DATE_FORMAT_MM_DD_YYYY_SLASH: MM/DD/YYYY format.
         - DATE_FORMAT_YYYY_MM_DD_DASH: YYYY-MM-DD format (ISO 8601).
         - DATE_FORMAT_DD_MM_YYYY_DASH: DD-MM-YYYY format.
         - DATE_FORMAT_MM_DD_YYYY_DASH: MM-DD-YYYY format.
         - DATE_FORMAT_YYYY_MM_DD_SLASH: YYYY/MM/DD format.
         - DATE_FORMAT_DD_MM_YYYY_DOT: DD.MM.YYYY format (European style).
         - DATE_FORMAT_MM_DD_YYYY_DOT: MM.DD.YYYY format.
         - DATE_FORMAT_YYYY_MM_DD_DOT: YYYY.MM.DD format.
         - DATE_FORMAT_DD_MMM_YYYY: DD MMM YYYY format (e.g., 15 Jan 2024).
         - DATE_FORMAT_MMM_DD_YYYY: MMM DD, YYYY format (e.g., Jan 15, 2024).
         - DATE_FORMAT_DD_MMMM_YYYY: DD MMMM YYYY format (e.g., 15 January 2024).
         - DATE_FORMAT_MMMM_DD_YYYY: MMMM DD, YYYY format (e.g., January 15, 2024).
    v1DecimalSymbol:
      type: string
      enum:
        - DECIMAL_SYMBOL_UNSPECIFIED
        - DECIMAL_SYMBOL_PERIOD
        - DECIMAL_SYMBOL_COMMA
      default: DECIMAL_SYMBOL_UNSPECIFIED
      description: |-
        Supported decimal symbols.

         - DECIMAL_SYMBOL_UNSPECIFIED: Unspecified decimal symbol.
         - DECIMAL_SYMBOL_PERIOD: Period (.) as decimal separator.
         - DECIMAL_SYMBOL_COMMA: Comma (,) as decimal separator.
    v1MeasurementSystem:
      type: string
      enum:
        - MEASUREMENT_SYSTEM_UNSPECIFIED
        - MEASUREMENT_SYSTEM_METRIC
        - MEASUREMENT_SYSTEM_IMPERIAL
      default: MEASUREMENT_SYSTEM_UNSPECIFIED
      description: |-
        Supported measurement systems.

         - MEASUREMENT_SYSTEM_UNSPECIFIED: Unspecified measurement system.
         - MEASUREMENT_SYSTEM_METRIC: Metric system.
         - MEASUREMENT_SYSTEM_IMPERIAL: Imperial system.
    v1CountExceptionsByGroupResponse:
      type: object
      properties:
        group_counts:
          type: array
          items:
            $ref: "#/components/schemas/v1ExceptionGroupCount"
          description: Exception counts by group, including metadata for each group.
        next_page_token:
          type: string
          description: |-
            Token to retrieve the next page of results.
            Empty when there are no more results.
        total_size:
          type: integer
          format: int32
          description: |-
            Total number of groups with exceptions (across all pages).
            Respects the filter from the request.
        total_exception_count:
          type: integer
          format: int32
          description: >-
            Total count of all exceptions across all groups.

            Respects the filter from the request.

            This is the sum of all counts in group_counts (across all pages).

            Useful for displaying summary statistics like "110 total exceptions across 3 groups".
      description: Response containing exception counts by group.
    v1ExceptionGroupCount:
      type: object
      properties:
        group:
          $ref: "#/components/schemas/v1ExceptionGroup"
        count:
          type: integer
          format: int32
          description: Number of exceptions in this group.
      description: Exception count for a specific group, including group metadata.
    v1ExceptionGroup:
      type: object
      properties:
        name:
          type: string
          description: >-
            The static types (e.g., "missing_values", "user_system_error",
            "internal_error").

            group name is fully qualified

            Format: organizations/{organization_id}/workspaces/{workspace_id}/exceptionGroups/missing_values

            Format: organizations/{organization_id}/workspaces/{workspace_id}/exceptionGroups/user_system_error

            Format: organizations/{organization_id}/workspaces/{workspace_id}/exceptionGroups/internal_error

            This is maintained by the system until we promote these to full resources.

            This is the value used in the Exception.group field.
        title:
          type: string
          description: Human-readable display name for UI.
        description:
          type: string
          description: Description of what this group represents.
        suggested_action:
          type: string
          description: Suggested action to resolve exceptions in this group.
        default_assignee:
          type: string
          title: >-
            Default assignee for new exceptions in this group.

            When set, new exceptions in this group will be automatically assigned to this user.

            Empty string means no default assignee is set.

            Format: users/{user}
      description: >-
        Groups are not full resources and cannot be created or modified via the
        API (for now)

        In future, we may promote these to full resources.
    v1QueryMetricsResponse:
      type: object
      properties:
        results:
          type: array
          items:
            $ref: "#/components/schemas/v1MetricResult"
          description: |-
            Results for each requested metric.

            Ordered in the same sequence as the metrics field in the request.
            Each result contains the time series data for one metric.
          readOnly: true
        next_page_token:
          type: string
          description: |-
            Token for retrieving the next page of results.

            If non-empty, there are more results available. Pass this value as
            page_token in the next request to retrieve the next page.

            If empty, there are no more results (this is the last page).

            When paginating, all metrics will include their next page of series.

            See https://google.aip.dev/158 for pagination specification.
          readOnly: true
      description: |-
        Response message for the QueryMetrics RPC.

        Contains results for each requested metric, with time series data
        and metadata about the query execution.
      required:
        - results
    v1MetricResult:
      type: object
      properties:
        metric:
          type: string
          description: |-
            The name of this metric.

            Echoes back the metric name from the request.
          readOnly: true
        interval:
          $ref: "#/components/schemas/v1MetricInterval"
        aggregation:
          $ref: "#/components/schemas/v1AggregationFunction"
        series:
          type: array
          items:
            $ref: "#/components/schemas/v1MetricSeries"
          description: >-
            Multiple time series, one per unique group_by combination.


            If group_by is empty, there will be exactly one series with empty tags.

            If group_by has values, there will be one series per unique combination

            found in the data.


            Series are ordered according to the order_by parameter in the request.

            If page_size was specified, results are paginated across all metrics.


            The list may be empty if no data exists for the requested time range.
          readOnly: true
      description: |-
        Result for a single metric query.

        Contains the time series data and metadata for one metric.
      required:
        - metric
        - interval
        - aggregation
        - series
    v1MetricSeries:
      type: object
      properties:
        tags:
          type: object
          additionalProperties:
            type: string
          description: >-
            Tags identifying this series.


            The unique combination of group_by tag values that define this series.

            If group_by is empty, this will be an empty map.


            Example: {"status": "success", "workspace_id": "ws_123"}
          readOnly: true
        points:
          type: array
          items:
            $ref: "#/components/schemas/v1MetricDataPoint"
          description: >-
            Time series data points for this specific tag combination.


            Chronologically ordered data points showing the metric value over time.
          readOnly: true
      description: >-
        A single time series for a specific combination of tag values.


        Each series represents one unique combination of the group_by dimensions,

        containing data points over time for that specific combination.
      required:
        - tags
        - points
    v1MetricDataPoint:
      type: object
      properties:
        start_time:
          type: string
          format: date-time
          description: >-
            The start time for this data point's interval.


            Represents the start of the interval for which the value is aggregated.
          readOnly: true
        value:
          type: number
          format: double
          description: |-
            The aggregated metric value for this interval.

            Result of applying the aggregation function to all matching records
            within this interval for this series' tag combination.
          readOnly: true
        window_label:
          type: string
          description: >-
            Human-readable label for the time window.


            Provides a formatted display name for the interval, formatted according

            to the interval granularity and the user's locale preferences.


            Examples:

            - HOUR: "Jan 15, 2025 10:00 AM", "2025-01-15 10:00"

            - DAY: "January 15, 2025", "2025-01-15"

            - WEEK: "Week of Jan 15, 2025", "2025-W03"

            - MONTH: "January 2025", "2025-01"
          readOnly: true
      description: |-
        A single data point in a metric time series.

        Represents an aggregated metric value at a specific point in time.
      required:
        - start_time
        - value
        - window_label
    v1AggregationFunction:
      type: string
      enum:
        - AGGREGATION_FUNCTION_UNSPECIFIED
        - AGGREGATION_FUNCTION_COUNT
        - AGGREGATION_FUNCTION_SUM
        - AGGREGATION_FUNCTION_AVG
        - AGGREGATION_FUNCTION_MIN
        - AGGREGATION_FUNCTION_MAX
      default: AGGREGATION_FUNCTION_UNSPECIFIED
      description: >-
        Aggregation function for metric values.


        Specifies how metric values should be aggregated within each interval.

         - AGGREGATION_FUNCTION_UNSPECIFIED: Unspecified aggregation. Defaults to COUNT.
         - AGGREGATION_FUNCTION_COUNT: Count of occurrences.
         - AGGREGATION_FUNCTION_SUM: Sum of values.
         - AGGREGATION_FUNCTION_AVG: Average of values.
         - AGGREGATION_FUNCTION_MIN: Minimum value.
         - AGGREGATION_FUNCTION_MAX: Maximum value.
    v1MetricInterval:
      type: string
      enum:
        - METRIC_INTERVAL_UNSPECIFIED
        - METRIC_INTERVAL_HOUR
        - METRIC_INTERVAL_DAY
        - METRIC_INTERVAL_WEEK
        - METRIC_INTERVAL_MONTH
      default: METRIC_INTERVAL_UNSPECIFIED
      description: >-
        Time interval for metric aggregation.


        Specifies the granularity at which metric data points are aggregated.

        The server may adjust the requested interval based on the time range

        or data availability.

         - METRIC_INTERVAL_UNSPECIFIED: Unspecified interval. Server will determine appropriate interval.
         - METRIC_INTERVAL_HOUR: Hourly aggregation.
         - METRIC_INTERVAL_DAY: Daily aggregation.
         - METRIC_INTERVAL_WEEK: Weekly aggregation.
         - METRIC_INTERVAL_MONTH: Monthly aggregation.
    v2SearchBookProceduresResponse:
      type: object
      properties:
        results:
          type: array
          items:
            $ref: "#/components/schemas/v2SearchBookProcedureMatch"
          title: Ranked list of matches for the given query
      title: Search results for book procedures
    v2SearchBookProcedureMatch:
      type: object
      properties:
        book_name:
          type: string
          title: Book name owning the procedure
        book_version:
          type: string
          title: Book version owning the procedure
        procedure:
          $ref: "#/components/schemas/v2BookProcedureDescriptor"
        score:
          type: number
          format: double
          title: Relevance score (higher is better)
      title: A match result for a searched procedure
    v2SearchBookProceduresRequest:
      type: object
      properties:
        query:
          type: string
          title: Free-text search query to match against procedure metadata and signatures
        top_k:
          type: integer
          format: int64
          title: Maximum number of results to return
        max_distance:
          type: number
          format: float
          title: Maximum distance threshold for similarity matching
      title: Search for procedures across all available books
    v1ListEventsResponse:
      type: object
      properties:
        events:
          type: array
          items:
            $ref: "#/components/schemas/v1Event"
          description: The events in the conversation thread, ordered by creation time
            (newest first).
        next_page_token:
          type: string
          description: >-
            A token to retrieve the next page of results.

            Pass this value in the `page_token` field in the subsequent call to `ListEvents`

            to continue listing results. Will be empty when there are no more results.
        total_size:
          type: integer
          format: int32
          description: >-
            The total number of events in the conversation thread across all
            pages.

            This count is not affected by page_size or page_token parameters.
      description: A response to a list events request.
    v1Event:
      type: object
      properties:
        name:
          type: string
          title: >-
            The full resource name of the event.

            Format: organizations/{organization_id}/workspaces/{workspace_id}/automations/{automation_id}/runs/{run_id}/agents/{agent_id}/events/{event_id}
        state:
          $ref: "#/components/schemas/v1EventState"
        create_time:
          type: string
          format: date-time
          description: The timestamp when the event was created.
          readOnly: true
        update_time:
          type: string
          format: date-time
          description: The timestamp when the event was last updated.
          readOnly: true
        user_message:
          $ref: "#/components/schemas/v1UserMessage"
        agent_message:
          $ref: "#/components/schemas/v1AgentMessage"
        tool_call_request:
          $ref: "#/components/schemas/v1ToolCallRequest"
        tool_call_result:
          $ref: "#/components/schemas/v1ToolCallResult"
        thinking:
          $ref: "#/components/schemas/v1Thinking"
        system_message:
          $ref: "#/components/schemas/v1SystemMessage"
        completion_response:
          $ref: "#/components/schemas/v1CompletionResponse"
        exception:
          type: string
          title: >-
            An optional exception resource name that the event belongs to.

            Format: organizations/{organization_id}/workspaces/{workspace_id}/exceptions/{exception_id}
      description: >-
        An event in a run conversation thread about an exception.

        Events form a timeline of interactions between users, AI agents, and the system.
    v1ToolCallRequest:
      type: object
      properties:
        tool_call_id:
          type: string
          description: The unique identifier for the tool call. Used to match the tool
            call request with the tool call result.
          readOnly: true
        display_name:
          type: string
          description: The display name of the tool being called.
          readOnly: true
        input:
          type: string
          description: >-
            The input arguments passed to the tool. Contains arbitrary data in a
            tool-specific format

            that the agent generates for the tool call.

            Note: Clients should not parse this field. The length of this field may change during

            STATE_STREAMING as the agent constructs the tool call arguments.
          readOnly: true
      description: A tool call request made by the AI agent.
    v1Thinking:
      type: object
      properties:
        content:
          type: string
          description: The thinking content. CommonMark(GFM) formatted.
          readOnly: true
      description: Thinking or reasoning by the AI agent.
    v1SystemMessage:
      type: object
      properties:
        content:
          type: string
          description: The content of the system message. CommonMark(GFM) formatted.
          readOnly: true
      description: A system-generated message.
    v1CompletionResponse:
      type: object
      properties:
        content:
          type: string
          description: Final content if successful.
        error:
          type: string
          description: Error description if the request failed.
      description: Terminal completion for the agent workflow.
    v1EventState:
      type: string
      enum:
        - STATE_UNSPECIFIED
        - STATE_STREAMING
        - STATE_COMPLETE
      default: STATE_UNSPECIFIED
      description: >-
        The state of an event.

         - STATE_UNSPECIFIED: The state is not specified. This value is not used.
         - STATE_STREAMING: The event fields are being generated by the AI agent. event_data fields may have partial values.
         - STATE_COMPLETE: The event fields are done being generated.
    v1UserMessage:
      type: object
      properties:
        user:
          type: string
          title: |-
            The user who authored the message.
            Format: users/{user}
        content:
          type: string
          description: Simple text content.
        content_list:
          $ref: "#/components/schemas/v1InputContentList"
      description: A message from a user.
    v1InputContentList:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/v1InputContent"
          description: The list of input content items.
      description: A list of input content items (can contain text and/or binary content).
      required:
        - items
    v1InputContent:
      type: object
      properties:
        text:
          type: string
          description: Text content.
        file:
          $ref: "#/components/schemas/v1FileInputContent"
      description: InputContent represents a single input item that can be text or binary.
    v1FileInputContent:
      type: object
      properties:
        remote:
          type: string
          title: Reference to a remote file via URL or file path
        inline:
          $ref: "#/components/schemas/v1FileContent"
      description: FileInputContent represents a file that can be either stored inline
        or referenced remotely.
    v1FileContent:
      type: object
      properties:
        mime_type:
          type: string
          description: The MIME type of the file.
        content:
          type: string
          format: byte
          title: The raw binary content of the file
        filename:
          type: string
          title: The name of the file, including extension if applicable
      description: FileContent represents a file with its name and binary content.
      required:
        - mime_type
        - content
    v1AgentMessage:
      type: object
      properties:
        content:
          type: string
          description: The content of the message. CommonMark(GFM) formatted.
          readOnly: true
      description: A message from the AI agent.
    v1ToolCallResult:
      type: object
      properties:
        tool_call_id:
          type: string
          description: The unique identifier for the tool call. Used to match the tool
            call request with the tool call result.
          readOnly: true
        result:
          type: string
          description: >-
            The result of the tool call.

            Note: Clients should not parse this field. The length of this field may change during

            STATE_STREAMING as the agent constructs the tool call result.
          readOnly: true
      description: A tool call result returned by the tool.
    v2SetAutomationsForTriggerInstanceResponse:
      type: object
      properties:
        trigger_instance:
          $ref: "#/components/schemas/v2TriggerInstance"
    v2RetrieveWorkspaceTriggerInstancesResponse:
      type: object
      properties:
        trigger_instances:
          type: array
          items:
            $ref: "#/components/schemas/v2TriggerInstance"
          title: The trigger instances
    v1ExtractAutomationCodeConnectionsResponse:
      type: object
      properties:
        connections:
          type: array
          items:
            $ref: "#/components/schemas/v1CredentialInfo"
          description: >-
            List of connections found in the automation's SPy code.

            Includes both placeholder connections (without connection_id) and concrete connections (with connection_id).
          readOnly: true
      description: ExtractAutomationCodeConnectionsResponse returns connection
        information from the automation's SPy code.
    v1UpgradeAutomationConnectionsResponse:
      type: object
      properties:
        automation:
          $ref: "#/components/schemas/v1Automation"
      description: UpgradeAutomationConnectionsResponse returns the updated automation.
    v1OrganizationPreferences:
      type: object
      properties:
        name:
          type: string
          title: |-
            The resource name of the organization preferences.
            Format: `organizations/{organization}/preferences`
        support_team_access:
          type: boolean
          description: Support team access to workspaces in the organization for debugging
            issues.
        general:
          $ref: "#/components/schemas/v1GeneralPreferences"
      description: Represents organization-specific settings or preferences.
    v1InvokeAutomationResponse:
      type: object
      properties:
        run_id:
          type: string
          description: |-
            Unique identifier of the run created to execute the automation.
            Use this ID to track execution status and retrieve results.
      description: InvokeAutomationResponse returns the run ID for tracking the
        automation execution.
    v1AutomationRevision:
      type: object
      properties:
        name:
          type: string
          description: >-
            The name of the automation revision.

            Format: organizations/{organization}/workspaces/{workspace}/automations/{automation}/revisions/{revision}

            The revision ID is the semantic version string (e.g., "0.1", "1.0", "2.0").
        snapshot:
          $ref: "#/components/schemas/v1Automation"
        create_time:
          type: string
          format: date-time
          description: Timestamp when this revision was created.
          readOnly: true
        alternate_ids:
          type: array
          items:
            type: string
          description: >-
            Other revision IDs that reference the same snapshot (e.g.,
            "latest").

            Per AIP-162, this allows aliases for revisions.
          readOnly: true
      description: >-
        AutomationRevision represents a historical revision (version) of an
        automation.

        Revisions are immutable snapshots created each time an automation is updated.

        Per AIP-162, this resource contains the complete state via a snapshot field.
    v1ListAutomationRevisionsResponse:
      type: object
      properties:
        revisions:
          type: array
          items:
            $ref: "#/components/schemas/v1AutomationRevision"
          description: |-
            The list of automation revisions for the current page.
            Revisions are ordered in reverse chronological order (newest first).
        next_page_token:
          type: string
          description: |-
            A token that can be sent as `page_token` to retrieve the next page.
            If this field is omitted, there are no subsequent pages.
      description: ListAutomationRevisionsResponse returns a page of automation
        revisions and pagination information.
    v2RetrieveBooksResponse:
      type: object
      properties:
        books:
          type: array
          items:
            $ref: "#/components/schemas/v2BookDescriptor"
          title: All the books that satisfy the query
        next_page_token:
          type: string
          description: The token to use to retrieve the next page of books.
    v1CountConnectionUsageResponse:
      type: object
      properties:
        connection_counts:
          type: array
          items:
            $ref: "#/components/schemas/v1ConnectionAutomationCount"
          description: |-
            List of connection IDs with their corresponding automation counts.
            The order matches the order of connection_ids in the request.
      description: CountConnectionUsageResponse returns automation counts for each
        requested connection ID.
    v1ConnectionAutomationCount:
      type: object
      properties:
        connection_id:
          type: string
          description: The connection ID being counted.
        count:
          type: integer
          format: int32
          description: |-
            The number of automations that use this connection.
            Includes both DRAFT and PUBLISHED automations by default.
      description: ConnectionAutomationCount represents the count of automations using
        a specific connection.
    v1CurrentUserOrganizationWorkspacesResponse:
      type: object
      properties:
        user_workspaces:
          type: array
          items:
            $ref: "#/components/schemas/v1Workspace"
          description: The list of workspaces the current user has access to in the
            organization.
        next_page_token:
          type: string
          description: >-
            A token to retrieve the next page of results.

            Pass this value in the `page_token` field in the subsequent call to

            `CurrentUserOrganizationWorkspaces` to get the next page of results. If this field is

            empty, it means there are no more results.
      description: Response message for listing workspaces for the current user within
        a specific organization.
    v2RemoveWorkspaceBookConnectionTriggerInstanceResponse:
      type: object
    v1GetExecutionOutputsResponse:
      type: object
      properties:
        outputs:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/v1ExecutionOutput"
          description: >-
            Map of named output values set by the set_output() builtin function
            during execution.

            The key is the output name (string) and the value is the ExecutionOutput containing

            the value and type set by calling set_output(name, value).

            This map will be empty if no set_output() calls were made during execution.
      description: GetExecutionOutputsResponse contains the outputs from a completed
        execution.
    v1ExecutionOutput:
      type: object
      properties:
        value:
          $ref: "#/components/schemas/commonV1Value"
        type:
          $ref: "#/components/schemas/v1ValueType"
      description: ExecutionOutput represents an output value set by the set_output()
        builtin function during execution.
    v1TraceConnectionUsageResponse:
      type: object
      properties:
        automations:
          type: array
          items:
            $ref: "#/components/schemas/v1AutomationConnectionUsage"
          description: List of automations that use the specified connection, with their
            stages.
      description: TraceConnectionUsageResponse returns automations that use the
        specified connection.
    v1AutomationConnectionUsage:
      type: object
      properties:
        automation_id:
          type: string
          description: >-
            The automation ID that uses the connection.

