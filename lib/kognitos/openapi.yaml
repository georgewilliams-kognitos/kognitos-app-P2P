    v1Exception:
      type: object
      properties:
        name:
          type: string
          title: >-
            The full resource name of the exception.

            Format: organizations/{organization_id}/workspaces/{workspace_id}/exceptions/{exception_id}
        run:
          type: string
          title: >-
            The run in which the exception occurred. The run must belong

            to the same workspace as the exception.

            Format: organizations/{organization}/workspaces/{workspace}/automations/{automation}/runs/{run}
        location:
          $ref: "#/components/schemas/commonV1Location"
        message:
          type: string
          description: The exception message generated by the interpreter.
        create_time:
          type: string
          format: date-time
          description: The timestamp of when the exception was created.
          readOnly: true
        update_time:
          type: string
          format: date-time
          description: The timestamp of when the exception was last updated.
          readOnly: true
        state:
          $ref: "#/components/schemas/v1ExceptionState"
        automation:
          type: string
          title: >-
            The automation that the exception belongs to. The automation of an
            exception

            is the automation that the run belongs to.

            Format: organizations/{organization}/workspaces/{workspace}/automations/{automation}
          readOnly: true
        description:
          type: string
          description: >-
            A human-friendly description of the exception. Generated by the
            exception service.

            Recently created exceptions may not yet have a description.
          readOnly: true
        group:
          type: string
          description: >-
            Groups are used to categorize exceptions

            Currently support static groups: "missing_values", "user_system_error", "internal_error"

            Format: organizations/{organization_id}/workspaces/{workspace_id}/exceptionGroups/missing_values

            Format: organizations/{organization_id}/workspaces/{workspace_id}/exceptionGroups/user_system_error

            Format: organizations/{organization_id}/workspaces/{workspace_id}/exceptionGroups/internal_error

            In future, we may support dynamic groups.

            Empty string means the exception is not grouped.
        resolution_guide_entry:
          type: string
          title: >-
            The guide entry that was used to automatically resolve this
            exception.

            Set when the exception service successfully applies

            a guide entry to resolve the exception i.e exception.state should be RESOLVED if this field is set.

            Format: organizations/{organization_id}/workspaces/{workspace_id}/automations/{automation_id}/guideEntries/{guide_entry_id}
          readOnly: true
        stage:
          $ref: "#/components/schemas/v1AutomationStage"
        execution_id:
          type: string
          title: >-
            The execution ID within the run where this exception occurred.

            Used to differentiate exceptions at the same location with the same message.

            Example: "exec_123abc" or a UUID
        extra:
          type: object
          additionalProperties:
            type: string
          description: Extra information about the exception.
        assignee:
          type: string
          title: |-
            The user assigned to resolve this exception.
            Format: users/{user}
        resolver:
          type: string
          description: >-
            The entity that resolved this exception.

            Can be either a user (for manual resolutions) or an agent (for automatic resolutions).

            Format: users/{user} or agents/{agent}

            Note: No resource_reference is specified to avoid service dependencies and to support

            multiple resource types in a single field.
      description: >-
        An exception that occurred during an automation run.

        Exceptions are raised by the interpreter and are analogous to Python exceptions.

        However, the Kognitos platform provides various mechanisms to resolve an

        exception and then resume the run.

        Automation runs are important business processes for our users, so the expectation

        is that every exception needs to be resolved even if the resolution involves manual steps

        or abandoning the automation run.
      required:
        - run
        - location
        - message
    v1ExceptionState:
      type: string
      enum:
        - EXCEPTION_STATE_UNSPECIFIED
        - EXCEPTION_STATE_PENDING
        - EXCEPTION_STATE_RESOLVED
        - EXCEPTION_STATE_ARCHIVED
      default: EXCEPTION_STATE_UNSPECIFIED
      description: >-
        The state of an exception.

         - EXCEPTION_STATE_UNSPECIFIED: The state is not specified.
         - EXCEPTION_STATE_PENDING: The exception is pending resolution.
        This is the initial state when an exception is created.

        Transitions:

        On creation --> PENDING

        PENDING --> RESOLVED: Exception successfully resolved (run can continue)

        PENDING --> ARCHIVED: Exception archived without resolution (run abandoned)
         - EXCEPTION_STATE_RESOLVED: The exception has been resolved.
        RESOLVED is a terminal state. Resolved exceptions are retained for historical records

        Transitions:

        PENDING --> RESOLVED: Exception resolved (run can continue)
         - EXCEPTION_STATE_ARCHIVED: The exception has been archived.
        Archived exceptions are retained for historical records and audit purposes.

        Transitions:

        PENDING --> ARCHIVED: Exception archived without resolution (run abandoned)

        ARCHIVED --> PENDING: Exception unarchived (run can continue)
