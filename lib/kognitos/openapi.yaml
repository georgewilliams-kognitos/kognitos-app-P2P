            When paginating, all other parameters provided to `ListWorkspaces` must match

            the call that provided the page token.
          in: query
          required: false
          schema:
            type: string
        - name: filter
          description: |-
            Optional. A filter expression to constrain the workspaces returned.
            The expression follows the syntax defined in AIP-160.
            Supported fields for filtering:
              - `title`: The display name of the workspace

            Examples:
              - `title = "My Workspace"` - exact match
              - `title : "workspace"` - contains match (case-insensitive)
          in: query
          required: false
          schema:
            type: string
        - name: order_by
          description: >-
            Optional comma-separated list of fields to order by, following
            AIP-132.

            Supported fields: title, create_time, update_time

            Example: "title", "create_time desc", "update_time desc,title"

            Default ordering is by create_time descending if not specified.
          in: query
          required: false
          schema:
            type: string
      tags:
        - Workspaces
