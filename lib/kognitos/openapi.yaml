                $ref: "#/components/schemas/v1CountExceptionsByAutomationResponse"
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/rpcStatus"
      parameters:
        - name: organization_id
          in: path
          required: true
          schema:
            type: string
        - name: workspace_id
          in: path
          required: true
          schema:
            type: string
        - name: filter
          description: >-
            Optional filter to apply before counting (same syntax as
            ListExceptions).

            Use this to count within a specific state, group, time range, etc.

            Example: "state = PENDING" to count only pending exceptions by automation.

            Example: "group = \"missing_values\"" to count exceptions in missing_values group by automation.
          in: query
          required: false
          schema:
            type: string
        - name: page_size
          description: >-
            The maximum number of automations to return.

            If unspecified, at most 50 automations will be returned.

            The maximum value is 1000; values above 1000 will be coerced to 1000.
          in: query
          required: false
          schema:
            type: integer
            format: int32
        - name: page_token
          description: The page token from a previous CountExceptionsByAutomation call.
          in: query
          required: false
          schema:
            type: string
      tags:
        - Exceptions
  "/api/v1/organizations/{organization_id}/workspaces/{workspace_id}/automations/{automation_id}/guideEntries/{guide_entry_id}":
