              schema:
                $ref: "#/components/schemas/rpcStatus"
      parameters:
        - name: page_size
          description: >-
            The maximum number of organizations to return.

            If unspecified, at most 50 organizations will be returned.

            The maximum value is 1000; values above 1000 will be coerced to 1000.
          in: query
          required: false
          schema:
            type: integer
            format: int32
        - name: page_token
          description: >-
            A page token, received from a previous
            `ListCurrentUserOrganizations` call.

            Provide this to retrieve the subsequent page.

            When paginating, all other parameters provided to `ListCurrentUserOrganizations` must match

