            month, or 0

            to specify a year by itself or a year and month where the day isn't

            significant.
          in: query
          required: false
          schema:
            type: integer
            format: int32
        - name: end_date.year
          description: >-
            Year of the date. Must be from 1 to 9999, or 0 to specify a date
