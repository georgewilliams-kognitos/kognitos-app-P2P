          title: The name of the trigger instance
        reference:
          type: string
          title: The reference of the trigger instance
        book_name:
          type: string
          title: The name of the book
        connection_id:
          type: string
          title: The identifier of the book connection
        trigger_id:
          type: string
          title: The name of the trigger
        configuration:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/bdkV2Value"
