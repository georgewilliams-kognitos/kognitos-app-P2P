openapi: 3.0.0
info:
  title: Kognitos API
  description: REST API for Kognitos platform — PAT-eligible endpoints
  version: 1.0.0
  contact:
    name: Kognitos
    url: https://kognitos.com
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
tags:
  - name: Organizations
    description: Manage organizations, users, roles, invitations, and preferences.
  - name: Workspaces
    description: Manage workspaces, members, roles, invitations, and preferences.
  - name: Automations
    description: Create and configure automations, revisions, schedules, triggers,
      and connections.
  - name: Runs
    description: Execute automations and manage run lifecycle — start, pause,
      continue, and view events.
  - name: Books
    description: Browse and search books, concepts, procedures, connections, and triggers.
  - name: Files
    description: Upload, download, and manage files.
  - name: Exceptions
    description: Track exceptions, view analytics, manage agent events, and access
      troubleshooting guides.
  - name: Analytics
    description: Query dashboards, automation estimates, insights, and metrics.
security:
  - BearerAuth: []
paths:
  "/api/v1/organizations/{organization_id}":
    get:
      summary: Get Organization
      operationId: GetOrganization
      responses:
        "200":
          description: A successful response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/v1Organization"
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/rpcStatus"
      parameters:
        - name: organization_id
          in: path
          required: true
          schema:
            type: string
      tags:
