  "/api/v1/organizations/{organization_id}/metrics:query":
    get:
      summary: Query Metrics
      description: >-
        This RPC retrieves time-series metric data for a specific organization,

        supporting multiple metrics in a single request. Results can be filtered,

        grouped, and sorted by tag dimensions.


        The response contains one result per requested metric. Each result includes

        multiple time series (one per unique group_by combination), with each series

        containing chronologically ordered data points showing the aggregated metric

        value over time.


        Use the filter parameter (AIP-160 syntax) to restrict data to specific

        tag values, and group_by to break down results by tag dimensions. The

        order_by and page_size parameters enable sorting and limiting results

        (useful for "top N" queries). The interval and aggregation parameters

        control how data is aggregated. If not specified, the server will determine

        appropriate defaults based on the time range.


        Example use cases:

        - Dashboard view: metrics=["runs", "pages"], group_by=["status"]

        - Top 10 workspaces: metrics=["runs"], group_by=["workspace_id"],
          order_by="value desc", page_size=10
        - Success rate: metrics=["runs"], filter='status = "success"'

        - Multi-metric comparison: metrics=["files", "automations"],
          group_by=["workspace_id"]
      operationId: QueryMetrics
      responses:
        "200":
          description: A successful response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/v1QueryMetricsResponse"
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/rpcStatus"
      parameters:
        - name: organization_id
          in: path
          required: true
          schema:
            type: string
        - name: metrics
          description: >-
            The names of the metrics to query.


            Identifies which metric types to retrieve data for in a single request.

            All metrics will use the same filter, group_by, time range, interval,

            and aggregation settings.


            Examples: ["runs"], ["runs", "pages"], ["files", "automations"]
          in: query
          required: true
          explode: true
          schema:
            type: array
            items:
              type: string
        - name: filter
          description: |-
            Filter expression to apply before aggregation.

            Reduces the dataset to only records matching the filter criteria.
            Uses the AIP-160 filtering syntax for flexible query expressions.
            An empty string means no filtering (all records included).

            Supported operators: =, !=, AND, OR, NOT, IN

            Examples:
            - 'status = "success"'
            - 'status = "success" AND workspace_id = "ws_123"'
            - 'status IN ["success", "pending"]'
            - 'workspace_id = "ws_123" OR workspace_id = "ws_456"'

            See https://google.aip.dev/160 for full syntax specification.
          in: query
          required: false
          schema:
            type: string
        - name: group_by
          description: >-
            Tag dimensions to group results by.


            Each unique combination of these tag values becomes a separate time series.

            An empty list means no grouping (single aggregated series).


            Examples: ["status"], ["workspace_id", "status"]
          in: query
          required: false
          explode: true
          schema:
            type: array
            items:
              type: string
        - name: start_time
          description: |-
            Start time for the query range (inclusive).

            Data points with timestamps on or after this time will be included.
          in: query
          required: true
          schema:
            type: string
            format: date-time
        - name: end_time
          description: |-
            End time for the query range (exclusive).

            Data points with timestamps before this time will be included.
          in: query
          required: true
          schema:
            type: string
            format: date-time
        - name: interval
          description: >-
            Requested time interval for aggregation.


            Specifies the desired granularity for data points. The server may

            adjust this based on the time range or data availability.


            If unspecified, the server will determine an appropriate interval.

             - METRIC_INTERVAL_UNSPECIFIED: Unspecified interval. Server will determine appropriate interval.
             - METRIC_INTERVAL_HOUR: Hourly aggregation.
             - METRIC_INTERVAL_DAY: Daily aggregation.
             - METRIC_INTERVAL_WEEK: Weekly aggregation.
             - METRIC_INTERVAL_MONTH: Monthly aggregation.
          in: query
          required: false
          schema:
            type: string
            enum:
              - METRIC_INTERVAL_UNSPECIFIED
              - METRIC_INTERVAL_HOUR
              - METRIC_INTERVAL_DAY
              - METRIC_INTERVAL_WEEK
              - METRIC_INTERVAL_MONTH
            default: METRIC_INTERVAL_UNSPECIFIED
        - name: aggregation
          description: >-
            Aggregation function to apply to metric values.


            Specifies how values should be combined within each interval.


            If unspecified, defaults to COUNT.

             - AGGREGATION_FUNCTION_UNSPECIFIED: Unspecified aggregation. Defaults to COUNT.
             - AGGREGATION_FUNCTION_COUNT: Count of occurrences.
             - AGGREGATION_FUNCTION_SUM: Sum of values.
             - AGGREGATION_FUNCTION_AVG: Average of values.
             - AGGREGATION_FUNCTION_MIN: Minimum value.
             - AGGREGATION_FUNCTION_MAX: Maximum value.
          in: query
          required: false
          schema:
            type: string
            enum:
              - AGGREGATION_FUNCTION_UNSPECIFIED
              - AGGREGATION_FUNCTION_COUNT
              - AGGREGATION_FUNCTION_SUM
              - AGGREGATION_FUNCTION_AVG
              - AGGREGATION_FUNCTION_MIN
              - AGGREGATION_FUNCTION_MAX
            default: AGGREGATION_FUNCTION_UNSPECIFIED
        - name: order_by
          description: >-
            Ordering for series results within each metric.


            Uses AIP-132 syntax: "field_name [asc|desc]"

            Multiple orderings can be comma-separated.


            Supported fields:

            - Tag names from group_by (e.g., "workspace_id asc", "status desc")

            - "value" for sorting by aggregated metric value (uses last data point)


            Examples:

            - "value desc" - Highest values first (e.g., top workspaces)

            - "workspace_id asc" - Alphabetical by workspace ID

            - "value desc, workspace_id asc" - By value descending, then workspace ascending


            If unspecified, series are returned in arbitrary order.


            See https://google.aip.dev/132 for full syntax specification.
          in: query
          required: false
          schema:
            type: string
        - name: page_size
          description: >-
            Maximum number of series to return per metric.


            Limits the number of time series in each metric's results.

            Useful with order_by for "top N" queries.


            If unspecified or zero, all matching series are returned.

            If page_size is larger than the number of matching series, all series

            are returned.


            Example: order_by="value desc", page_size=10 returns top 10 series.
          in: query
          required: false
          schema:
            type: integer
            format: int32
        - name: page_token
          description: >-
            Pagination token for retrieving the next page of series.


            When a response contains more series than page_size, the next_page_token

            from the response can be passed here to retrieve the next page.


            If empty, returns the first page of results.


            See https://google.aip.dev/158 for pagination specification.
          in: query
          required: false
          schema:
            type: string
      tags:
        - Analytics
