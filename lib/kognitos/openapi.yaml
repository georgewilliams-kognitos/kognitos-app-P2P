        short_description:
          type: string
          title: Short description of the book
        long_description:
          type: string
          title: Short description of the book
        author:
          type: string
          title: Author of the book
        icon:
          type: string
          format: byte
          title: Icon of the book in an image format that is web-compatible (i.e. JPG,
            PNG, SVG, WebP)
        version:
          type: string
          title: Version of the book
        authentications:
          type: array
          items:
            $ref: "#/components/schemas/v2BookAuthenticationDescriptor"
          title: Authentication mechanism for a book version
        configurations:
          type: array
          items:
            $ref: "#/components/schemas/v2ConceptDescriptor"
          title: "All the parameters available for configuring the behaviour of this book.
            Note: replaced by config_map"
        display_name:
          type: string
          title: Display name of the book
        endpoint:
