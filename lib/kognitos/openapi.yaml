                $ref: "#/components/schemas/rpcStatus"
      parameters:
        - name: organization_id
          in: path
          required: true
          schema:
            type: string
        - name: workspace_id
          in: path
          required: true
          schema:
            type: string
        - name: page_size
          description: >-
            The maximum number of automations to return in a single response.

            The service may return fewer than this value.

            If unspecified, at most 10 automations will be returned.

            The maximum value is 1000; values above 1000 will be coerced to 1000.

            If negative, an INVALID_ARGUMENT error will be returned.
          in: query
          required: false
          schema:
            type: integer
            format: int32
        - name: page_token
          description: >-
            A page token received from a previous `ListAutomations` call.

            Provide this to retrieve the subsequent page of results.

            When paginating, all other parameters provided to `ListAutomations` must match

            the call that provided the page token.
          in: query
          required: false
          schema:
            type: string
        - name: show_deleted
          description: Filter to show/hide deleted automations. Deleted automations will
            be hidden by default.
          in: query
          required: false
          schema:
            type: boolean
        - name: filter
          description: >-
            Filter expression to restrict results. Per AIP-160, this should be a

            filtering expression following the Common Expression Language (CEL) syntax.


            Supported fields for filtering:
              - `state`: The automation state (e.g., DRAFT, PUBLISHED)

            Example filters:
              - `state = "PUBLISHED"`
          in: query
          required: false
          schema:
            type: string
        - name: order_by
          description: >-
            Reserved for future use. Comma-separated list of fields to order
            results by.

            Per AIP-132, this should be a string containing one or more field names,

            each optionally followed by "asc" or "desc" to specify sort direction.


            Currently not implemented. Results are always ordered by `update_time desc`

            (most recently updated first).
          in: query
          required: false
          schema:
            type: string
      tags:
        - Automations
