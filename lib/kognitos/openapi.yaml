  "/api/v1/organizations/{organization_id}/workspaces/{workspace_id}/automations:deleteConnection":
    delete:
      summary: Delete Workspace Connection
      description: >-
        This API validates that the connection is not in use by any published

        automations before deletion. If only draft automations use the connection,

        deletion proceeds and returns the list of affected automations.


        The affected draft automations will have unresolved connection references

        after deletion. They can still be edited but cannot be published until

        new connections are configured.


        Errors:

        - FAILED_PRECONDITION: Connection is in use by one or more published automations.
          The error details include DeleteConnectionBlockedError with blocking automations.
        - NOT_FOUND: Connection not found in the workspace.

        - INTERNAL: Failed to communicate with the connection storage service.
      operationId: DeleteWorkspaceConnection
      responses:
        "200":
          description: A successful response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/v1DeleteWorkspaceConnectionResponse"
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/rpcStatus"
      parameters:
        - name: organization_id
          in: path
          required: true
          schema:
            type: string
        - name: workspace_id
          in: path
          required: true
          schema:
            type: string
        - name: connection_id
          description: The connection ID to delete.
          in: query
          required: true
          schema:
            type: string
      tags:
        - Automations
