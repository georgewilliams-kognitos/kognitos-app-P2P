  "/api/v1/organizations/{organization_id}/workspaces/{workspace_id}/automations/{automation_id}/runs/{run_id}/events":
    get:
      summary: List Run Events
      description: >-
        This RPC retrieves a paginated list of all events that occurred during

        a specific automation run. Events are returned in the order they were

        generated, providing a complete timeline of the run's execution.


        Use the filter parameter to narrow results by specific criteria such as

        node_kind for execution journal events.


        The response includes both high-level run state changes (starts, completions,

        failures) and detailed execution steps (node executions, execution patches,

        detailed data flows in each expression, etc).
      operationId: ListRunEvents
      responses:
        "200":
          description: A successful response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/v1ListRunEventsResponse"
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/rpcStatus"
      parameters:
        - name: organization_id
          in: path
          required: true
          schema:
            type: string
        - name: workspace_id
          in: path
          required: true
          schema:
            type: string
        - name: automation_id
          in: path
          required: true
          schema:
            type: string
        - name: run_id
          in: path
          required: true
          schema:
            type: string
        - name: page_size
          description: |-
            Maximum number of run events to return in a single response.

            The service may return fewer events than requested, but will never
            return more. This can happen when:
            - The run has fewer total events than requested
            - Internal chunking limits are reached
            - The remaining events don't fit in the response size limit

            Valid range: 1-1000 events
            Default: 100 events if unspecified
            Values above 1000 are automatically capped at 1000
            Negative values result in an INVALID_ARGUMENT error
          in: query
          required: false
          schema:
            type: integer
            format: int32
        - name: page_token
          description: |-
            Pagination token from a previous ListRunEvents response.

            Provide the `next_page_token` value from a previous response to
            continue retrieving the next set of events. Leave empty or unset
            for the first page of results.

            The token is opaque and should not be parsed or modified by clients.
          in: query
          required: false
          schema:
            type: string
        - name: filter
          description: >-
            Filter expression to narrow down which events are returned.


            The filter string follows the AIP-160 filtering syntax

            (https://google.aip.dev/160).


            Supported fields for filtering:

            - node_kind: Filter execution journal events by the kind/type of node.
              Only execution journal events with matching node_kind are returned.
              Example: node_kind = "FunctionCall"

            When empty or unset, all events for the specified run are returned.


            Example filters:
              node_kind = "FunctionCall"
              node_kind = "Assignment"
          in: query
          required: false
          schema:
            type: string
      tags:
        - Runs
