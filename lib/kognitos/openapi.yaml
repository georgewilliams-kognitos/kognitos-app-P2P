  "/api/v1/organizations/{organization_id}/workspaces/{workspace_id}/automations/{automation_id}/guideEntries":
    get:
      summary: List Guide Entries
      operationId: ListGuideEntries
      responses:
        "200":
          description: A successful response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/v1ListGuideEntriesResponse"
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/rpcStatus"
      parameters:
        - name: organization_id
          in: path
          required: true
          schema:
            type: string
        - name: workspace_id
          in: path
          required: true
          schema:
            type: string
        - name: automation_id
          in: path
          required: true
          schema:
            type: string
        - name: page_size
          description: >-
            The maximum number of guide entries to return. The service may
            return fewer than this value.

            If unspecified, at most 50 guide entries will be returned.

            The maximum value is 1000; values above 1000 will be coerced to 1000.

            Note: These limits are enforced by server-side validation.
          in: query
          required: false
          schema:
            type: integer
            format: int32
        - name: page_token
          description: >-
            The page token, received from a previous `ListGuideEntries` call.

            Provide this to retrieve the subsequent page.

            When paginating, all other parameters provided to `ListGuideEntries` must match

            the call that provided the page token.
          in: query
          required: false
          schema:
            type: string
        - name: show_deleted
          description: |-
            If true, soft-deleted guide entries will be included in the results.
            Deleted entries have delete_time set.
            Defaults to false (deleted entries are filtered out).
          in: query
          required: false
          schema:
            type: boolean
        - name: filter
          description: >-
            The filter to apply to the list of guide entries.

            Follows Google AIP-160 filtering standard (https://google.aip.dev/160).


            Supported Fields:

            - title: Guide entry title (partial match only)

            - resolution_steps: Resolution steps content (partial match only)

            - resolution_code: Resolution code content (partial match only)

            - resolution_notes: Resolution notes content (partial match only)

            - automation: Automation ID (exact match only)

            - create_time: Guide entry creation timestamp (ISO 8601 format)

            - update_time: Guide entry update timestamp (ISO 8601 format)

            - content: (DEPRECATED) Guide entry content - use resolution_steps, resolution_code, or resolution_notes instead


            Supported Operators:

            - Comparison: =, !=, <, <=, >, >=

            - Logical: AND, OR, NOT

            - Grouping: ( )

            - Partial Match: contains


            Example Filters:

            - "title contains 'My Guide Entry'" - List guide entries with title containing "My Guide Entry"

            - "resolution_steps contains 'restart'" - List guide entries with resolution steps containing "restart"

            - "resolution_code contains 'retry'" - List guide entries with resolution code containing "retry"

            - "automation = my-automation-id" - List guide entries for a specific automation. Use "-" as the automation_id to list guide entries across all automations in the workspace.

            - "automation = my-automation-id or automation = another-automation-id" - List guide entries for specific automations.

            - "create_time > \"2025-01-01T00:00:00Z\"" - Guide entries created after Jan 1, 2025

            - "update_time >= \"2025-01-01T00:00:00Z\" AND update_time < \"2025-02-01T00:00:00Z\"" - January 2025 guide entries

            - "(title contains 'My Guide Entry' OR resolution_steps contains 'error') AND create_time > \"2025-01-01T00:00:00Z\"" - Recent guide entries with specific title or resolution steps
          in: query
          required: false
          schema:
            type: string
      tags:
        - Exceptions
servers:
  - url: https://app.us-1.kognitos.com
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      description: 'Personal Access Token.'
  schemas:
    v1QueryAutomationRunAggregatesResponse:
      type: object
      properties:
        automation_run_aggregates:
          type: array
          items:
            $ref: "#/components/schemas/v1AutomationRunAggregateEntry"
          description: List of automation run statistics entries.
          readOnly: true
      description: |-
        Response message for QueryAutomationRunAggregates method.
        Contains statistics for each automation in the workspace.
    v1AutomationRunAggregateEntry:
      type: object
      properties:
        automation_id:
          type: string
          title: >-
            The automation ID for this entry.

            Format: organizations/{organization}/workspaces/{workspace}/automations/{automation}
          readOnly: true
        stats:
          $ref: "#/components/schemas/v1AutomationRunAggregate"
      description: |-
        Entry for automation run statistics.
        Contains the automation ID and its associated run counts.
    v1AutomationRunAggregate:
      type: object
      properties:
        total_runs:
          type: string
          format: int64
          description: The total number of runs for this automation.
          readOnly: true
        completed_runs:
          type: string
          format: int64
          description: The number of completed runs for this automation.
          readOnly: true
      description: |-
        Stats for a single automation.
        Contains run counts and other metrics.
    v1ListWorkspaceRolesResponse:
      type: object
      properties:
        roles:
          type: array
          items:
            $ref: "#/components/schemas/v1Role"
          description: The list of roles in the workspace.
        next_page_token:
          type: string
          description: |-
            A token to retrieve the next page of results.
            Pass this value in the page_token field in the subsequent call to
            ListWorkspaceRoles to get the next page of results.
      description: Response message for ListWorkspaceRoles.
    v1Role:
      type: object
      properties:
        name:
          type: string
          title: >-
            Resource name of the role.

            Format: organizations/{organization}/roles/{role} (org-level)

            Format: organizations/{organization}/workspaces/{workspace}/roles/{role} (workspace-level)
        title:
          type: string
          description: Human-readable title of the role (e.g., "Administrator", "Editor").
        description:
          type: string
          description: Description of what this role grants.
        permissions:
          type: array
          items:
            type: string
          title: >-
            List of permission strings this role grants.

            Format: "action:Resource" (e.g., "create:Automation", "read:Workspace")
          readOnly: true
      description: >-
        A Role represents a concrete, assignable role that can be assigned to
        users.

        Roles can be created from RoleTemplates or as standalone custom roles.
      required:
        - title
    v1ListAutomationTriggersResponse:
      type: object
      properties:
        automation_triggers:
          type: array
          items:
            $ref: "#/components/schemas/v1AutomationTrigger"
          description: List of triggers that are active for the specified automation.
        next_page_token:
          type: string
          description: |-
            A token that can be sent as `page_token` to retrieve the next page.
            If this field is omitted, there are no subsequent pages.
      description: Response containing the list of active triggers for an automation.
    v1AutomationTrigger:
      type: object
      properties:
        trigger_id:
          type: string
          description: |-
            The external trigger ID created by another service.
            This ID uniquely identifies the trigger in the external system.
        automation:
          type: string
          title: >-
            Reference to the automation to be triggered.

            Format: organizations/{organization}/workspaces/{workspace}/automations/{automation}
          readOnly: true
        input_mapping:
          type: object
          additionalProperties:
            type: string
          description: >-
            Input mapping for the automation execution.

            Keys are input parameter names, values are the corresponding values to pass.
        phase_type:
          $ref: "#/components/schemas/v1PhaseType"
        phase_sub_type:
          $ref: "#/components/schemas/v1PhaseSubType"
        is_active:
          type: boolean
          description: Whether this trigger is currently active.
      description: >-
        AutomationTrigger represents phase configuration metadata for an
        external trigger.

        The trigger itself is created and managed by another service; this message

        stores additional metadata about how the trigger relates to automation phases.
      required:
        - trigger_id
        - phase_type
    v1PhaseType:
      type: string
      enum:
        - PHASE_TYPE_UNSPECIFIED
        - PHASE_TYPE_PRE
        - PHASE_TYPE_MAIN
        - PHASE_TYPE_POST
      default: PHASE_TYPE_UNSPECIFIED
      description: |-
        PhaseType defines the type of phase for an automation trigger.

         - PHASE_TYPE_UNSPECIFIED: Unspecified phase type.
         - PHASE_TYPE_PRE: Pre-processing phase.
         - PHASE_TYPE_MAIN: Main processing phase.
         - PHASE_TYPE_POST: Post-processing phase.
    v1PhaseSubType:
      type: string
      enum:
        - PHASE_SUB_TYPE_UNSPECIFIED
        - PHASE_SUB_TYPE_EMAIL
        - PHASE_SUB_TYPE_SCHEDULE
        - PHASE_SUB_TYPE_WEBHOOK
        - PHASE_SUB_TYPE_API
      default: PHASE_SUB_TYPE_UNSPECIFIED
      description: >-
        PhaseSubType defines the sub-type within a phase for an automation
        trigger.

         - PHASE_SUB_TYPE_UNSPECIFIED: Unspecified phase sub-type.
         - PHASE_SUB_TYPE_EMAIL: Email trigger sub-type.
         - PHASE_SUB_TYPE_SCHEDULE: Schedule-based trigger sub-type.
         - PHASE_SUB_TYPE_WEBHOOK: Webhook trigger sub-type.
         - PHASE_SUB_TYPE_API: API trigger sub-type.
    v1Workspace:
      type: object
      properties:
        name:
          type: string
          description: >-
            The resource name of the workspace.

            Format: organizations/{organization}/workspaces/{workspace}

            This field is assigned by the server at creation and is immutable thereafter.

            Clients may include this field in Get/Update/Delete requests to identify the resource.
        title:
          type: string
          description: |-
            The user-defined display name for the workspace.
            This corresponds to the `name` column in the database.
        workspace_icon:
          type: string
          description: |-
            The workspace icon data.
            This field contains the identifier of the workspace icon.
        workspace_icon_color:
          type: string
          description: The color of the workspace icon.
        create_time:
          type: string
          format: date-time
          description: The timestamp when the workspace was created.
          readOnly: true
        update_time:
          type: string
          format: date-time
          description: The timestamp when the workspace was last updated.
          readOnly: true
        creator_display_name:
          type: string
          description: The display name of the user who created the workspace.
          readOnly: true
        creator_email:
          type: string
          description: The email address of the user who created the workspace.
          readOnly: true
      description: A Workspace is a container for agents within an organization.
      required:
        - title
    v1ListRunEventsResponse:
      type: object
      properties:
        run_events:
          type: array
          items:
            $ref: "#/components/schemas/v1RunEvent"
          description: >-
            The list of run events for the requested page.


            Events are returned in chronological order based on when they occurred

            during the automation run execution. Each event contains either:

            - A run state update from the Jeeves orchestration service

            - An execution journal entry from the Jarvis execution engine
        next_page_token:
          type: string
          description: >-
            Pagination token for retrieving the next page of events.


            Include this token as the `page_token` in a subsequent ListRunEvents

            request to retrieve the next set of events. The token maintains

            cursor position and ensures consistent pagination even if new

            events are added to the run.


            When this field is empty or omitted:

            - This is the final page of results

            - All events for the run have been retrieved

            - No further pagination requests are needed


            The token is opaque. Do not attempt to parse, modify, or reuse tokens

            across different parent resources or request parameters.
      description: >-
        Response message for the ListRunEvents RPC.


        Contains a page of run events in chronological order, along with pagination

        information for retrieving additional events. Events are sorted by their

        occurrence time, providing a complete timeline of the run's execution.


        The response may contain fewer events than requested if:

        - The run has fewer remaining events than the page size

        - This is the final page of results

        - Response size limits are reached
    v1RunEvent:
      type: object
      properties:
        run_update:
          $ref: "#/components/schemas/v1RunUpdate"
        execution_journal:
          $ref: "#/components/schemas/v1ExecutionJournal"
      description: A single event that occurred during an automation run execution.
    v1ExecutionJournal:
      type: object
      properties:
        execution_id:
          type: string
          title: Unique identifier for the execution
        run_id:
          type: string
          title: "Optional: Run identifier, set if the execution is part of a run"
        event_time:
          type: string
          format: date-time
          title: When this journal entry was generated
        started:
          $ref: "#/components/schemas/v1ExecutionStarted"
        completed:
          $ref: "#/components/schemas/v1ExecutionCompleted"
        stopped:
          $ref: "#/components/schemas/v1ExecutionStopped"
        failed:
          $ref: "#/components/schemas/v1ExecutionFailed"
        node_started:
          $ref: "#/components/schemas/v1NodeStarted"
        node_executed:
          $ref: "#/components/schemas/v1NodeExecuted"
        node_skipped:
          $ref: "#/components/schemas/v1NodeSkipped"
        node_patched:
          $ref: "#/components/schemas/v1NodePatched"
        patched_node_started:
          $ref: "#/components/schemas/v1PatchedNodeStarted"
        patched_node_executed:
          $ref: "#/components/schemas/v1PatchedNodeExecuted"
        automation_id:
          type: string
          title: "Optional: Automation identifier, set if the execution is part of an
            automation"
        automation_phase_id:
          type: string
          title: "Optional: Automation phase identifier, set if the execution is part of
            an automation phase"
        code_hash:
          type: string
          title: "Optional: MD5 hash of the SPy code being executed"
        stage:
          $ref: "#/components/schemas/v1AutomationStage"
        workspace_id:
          type: string
          title: The workspace id for which the execution is requested
        organization_id:
          type: string
          title: The organization id for which the execution is requested
        extra_metadata:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/commonV1Value"
          description: >-
            Optional extra metadata to be stored with the execution

            This will be used to pass the additional information that downstream services might require

            but there is no need to Jarvis to know about it.
      title: Journal event for an execution, capturing status and node-level events
    v1ExecutionCompleted:
      type: object
      properties:
        outputs:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/commonV1Value"
          description: >-
            Map of named output values set by the set_output() builtin function
            during execution.

            Each entry is a name-value pair where the key is the output name (string) and

            the value is the output value set by calling set_output(name, value).

            This map will be empty if no set_output() calls were made during execution.
      description: >-
        ExecutionCompleted indicates that Jarvis has successfully completed the
        execution.

        The final result value is included in this message, representing the return value of

        the executed code.
    commonV1Value:
      type: object
      properties:
        null_value:
          type: string
          title: Represents the absence of a value (None/null/undefined)
        bool_value:
          type: boolean
          title: Boolean true/false value
        number:
          $ref: "#/components/schemas/v1Number"
        text:
          type: string
          title: UTF-8 encoded text string
        date:
          $ref: "#/components/schemas/typeDate"
        timeofday:
          $ref: "#/components/schemas/typeTimeOfDay"
        datetime:
          $ref: "#/components/schemas/typeDateTime"
        time_zone:
          $ref: "#/components/schemas/typeTimeZone"
        duration:
          type: string
          title: Signed duration representing a span of time
        list:
          $ref: "#/components/schemas/v1List"
        dictionary:
          $ref: "#/components/schemas/v1Dictionary"
        file:
          $ref: "#/components/schemas/v1FileValue"
        table:
          $ref: "#/components/schemas/v1TableValue"
        set:
          $ref: "#/components/schemas/v1Set"
      description: >-
        Represents a runtime value that can be produced by the Jarvis
        interpreter.


        This message provides a type-safe way to serialize and transmit values between

        the Jarvis interpreter and other services via gRPC. It supports all the basic

        data types that can be represented in the Jarvis language runtime.


        The oneof structure ensures that exactly one value type is set at a time,

        providing both type safety and efficient serialization.
    typeDateTime:
      type: object
      properties:
        year:
          type: integer
          format: int32
          description: |-
            Optional. Year of date. Must be from 1 to 9999, or 0 if specifying a
            datetime without a year.
        month:
          type: integer
          format: int32
          description: Required. Month of year. Must be from 1 to 12.
        day:
          type: integer
          format: int32
          description: >-
            Required. Day of month. Must be from 1 to 31 and valid for the year
            and

            month.
        hours:
          type: integer
          format: int32
          description: >-
            Required. Hours of day in 24 hour format. Should be from 0 to 23. An
            API

            may choose to allow the value "24:00:00" for scenarios like business

            closing time.
        minutes:
          type: integer
          format: int32
          description: Required. Minutes of hour of day. Must be from 0 to 59.
        seconds:
          type: integer
          format: int32
          description: >-
            Required. Seconds of minutes of the time. Must normally be from 0 to
            59. An

            API may allow the value 60 if it allows leap-seconds.
        nanos:
          type: integer
          format: int32
          description: |-
            Required. Fractions of seconds in nanoseconds. Must be from 0 to
            999,999,999.
        utc_offset:
          type: string
          description: |-
            UTC offset. Must be whole seconds, between -18 hours and +18 hours.
            For example, a UTC offset of -4:00 would be represented as
            { seconds: -14400 }.
        time_zone:
          $ref: "#/components/schemas/typeTimeZone"
      description: >-
        Represents civil time (or occasionally physical time).


        This type can represent a civil time in one of a few possible ways:

         * When utc_offset is set and time_zone is unset: a civil time on a calendar
           day with a particular offset from UTC.
         * When time_zone is set and utc_offset is unset: a civil time on a calendar
           day in a particular time zone.
         * When neither time_zone nor utc_offset is set: a civil time on a calendar
           day in local time.

        The date is relative to the Proleptic Gregorian Calendar.


        If year is 0, the DateTime is considered not to have a specific year. month

        and day must have valid, non-zero values.


        This type may also be used to represent a physical time if all the date and

        time fields are set and either case of the `time_offset` oneof is set.

        Consider using `Timestamp` message for physical time instead. If your use

        case also would like to store the user's timezone, that can be done in

        another field.


        This type is more flexible than some applications may want. Make sure to

        document and validate your application's limitations.
    typeTimeZone:
      type: object
      properties:
        id:
          type: string
          description: IANA Time Zone Database time zone, e.g. "America/New_York".
        version:
          type: string
          description: Optional. IANA Time Zone Database version number, e.g. "2019a".
      description: |-
        Represents a time zone from the
        [IANA Time Zone Database](https://www.iana.org/time-zones).
    v1Number:
      type: object
      properties:
        lo:
          type: integer
          format: int64
          description: Low 32 bits of the 96-bit mantissa.
        mid:
          type: integer
          format: int64
          description: Middle 32 bits of the 96-bit mantissa.
        hi:
          type: integer
          format: int64
          description: High 32 bits of the 96-bit mantissa.
        flags:
          type: integer
          format: int64
          description: |-
            Flags word:
             - Bits 16–23: scale (0–28)
             - Bit 31: sign (0 = positive, 1 = negative)
             - Other bits must be zero.
      description: |
        A fixed-precision decimal number with up to 28 fractional digits.

        This message represents decimal numbers with exact precision, avoiding
        floating-point rounding errors. It's particularly useful for financial
        calculations, measurements, and any scenario where exact decimal
        representation is required.

        The value is calculated as: m / 10^e, where:
         - m is an unsigned 96-bit integer composed of (lo, mid, hi)
         - e is the scale (0–28) stored in flags bits 16–23
         - sign is encoded in flags bit 31 (0 = positive, 1 = negative)

        Examples:
         - 123.45 would have m=12345, e=2
         - -0.001 would have m=1, e=3, with sign bit set
    v1FileValue:
      type: object
      properties:
        remote:
          type: string
        inline:
          $ref: "#/components/schemas/v1File"
      title: A file value represents a file that can be either inline or remote
    v1File:
      type: object
      properties:
        file_name:
          type: string
          title: The name of the file
        content:
          type: string
          format: byte
          title: Content of the file as a byte stream
    typeTimeOfDay:
      type: object
      properties:
        hours:
          type: integer
          format: int32
          description: >-
            Hours of day in 24 hour format. Should be from 0 to 23. An API may
            choose

            to allow the value "24:00:00" for scenarios like business closing time.
        minutes:
          type: integer
          format: int32
          description: Minutes of hour of day. Must be from 0 to 59.
        seconds:
          type: integer
          format: int32
          description: >-
            Seconds of minutes of the time. Must normally be from 0 to 59. An
            API may

            allow the value 60 if it allows leap-seconds.
        nanos:
          type: integer
          format: int32
          description: Fractions of seconds in nanoseconds. Must be from 0 to 999,999,999.
      description: >-
        Represents a time of day. The date and time zone are either not
        significant

        or are specified elsewhere. An API may choose to allow leap seconds. Related

        types are [google.type.Date][google.type.Date] and

        `google.protobuf.Timestamp`.
    v1TableValue:
      type: object
      properties:
        remote:
          type: string
        inline:
          $ref: "#/components/schemas/v1Table"
      title: >-
        A table that is represented remote as an URL to a file that is
        Feather-formatted

        or inline via the Table message
    v1Table:
      type: object
      properties:
        columns:
          type: array
          items:
            $ref: "#/components/schemas/v1Column"
      description: >-
        A table is a column-oriented structure. All the values inside each
        column must

        be of equal length.
    v1Column:
      type: object
      properties:
        values:
          type: array
          items:
            $ref: "#/components/schemas/bdkV1Value"
        name:
          type: string
    bdkV1Value:
      type: object
      properties:
        null_value:
          type: string
        conceptual_value:
          $ref: "#/components/schemas/v1NounPhrase"
        text_value:
          type: string
        number_value:
          type: number
          format: double
        boolean_value:
          type: boolean
        datetime_value:
          type: string
          format: date-time
        date_value:
          $ref: "#/components/schemas/v1Date"
        time_value:
          $ref: "#/components/schemas/v1Time"
        file_value:
          $ref: "#/components/schemas/v1FileValue"
        dictionary_value:
          $ref: "#/components/schemas/v1DictionaryValue"
        list_value:
          $ref: "#/components/schemas/bdkV1ListValue"
        opaque_value:
          $ref: "#/components/schemas/v1OpaqueValue"
        table_value:
          $ref: "#/components/schemas/v1TableValue"
        sensitive_value:
          $ref: "#/components/schemas/v1SensitiveValue"
      title: A union of all possible values
    v1DictionaryValue:
      type: object
      properties:
        fields:
          type: array
          items:
            $ref: "#/components/schemas/v1DictionaryValueField"
          title: All the fields alongside their values in the dictionary
        is_a:
          type: array
          items:
            $ref: "#/components/schemas/v1NounPhrase"
          title: Is a replationships for the dictionary
      title: Value to be used when the type is dictionary
    v1NounPhrase:
      type: object
      properties:
        modifiers:
          type: array
          items:
            type: string
          title: Optional adjectives attached to the noun
        head:
          type: string
          title: Noun of the phrase
    v1DictionaryValueField:
      type: object
      properties:
        key:
          type: string
        value:
          $ref: "#/components/schemas/bdkV1Value"
      title: Each key-value pair inside a dictionary
    v1OpaqueValue:
      type: object
      properties:
        content:
          type: string
          format: byte
          title: Content of the opaque value
        is_a:
          type: array
          items:
            $ref: "#/components/schemas/v1NounPhrase"
          title: Is a replationships for the opaque
    v1SensitiveValue:
      type: object
      properties:
        value:
          $ref: "#/components/schemas/bdkV1Value"
      title: A sensitive value is any value marked as sensitive (to prevent exposure)
    v1Date:
      type: object
      properties:
        year:
          type: integer
          format: int32
          title: Year of the date
        month:
          type: integer
          format: int32
          title: Month of a year
        day:
          type: integer
          format: int32
          title: Day of a month
    v1Time:
      type: object
      properties:
        hours:
          type: integer
          format: int32
          title: Hours of day
        minutes:
          type: integer
          format: int32
          title: Minutes of hour of day
        seconds:
          type: integer
          format: int32
          title: Seconds of minutes of the time
        nanos:
          type: integer
          format: int32
          title: Fractions of seconds in nanoseconds
    bdkV1ListValue:
      type: object
      properties:
        values:
          type: array
          items:
            $ref: "#/components/schemas/bdkV1Value"
          title: All the values inside the list
      title: A collection of values
    v1Dictionary:
      type: object
      properties:
        entries:
          type: array
          items:
            $ref: "#/components/schemas/v1DictionaryEntry"
          title: The key-value pairs stored in this dictionary
      description: >-
        Represents a key-value mapping (similar to hash maps or dictionaries).


        This message stores associations between keys and values, where keys must be

        hashable types (null, bool, Number, string, Date, TimeOfDay, DateTime, TimeZone). Keys are

        unique within a dictionary - duplicate keys will overwrite previous values.


        The dictionary maintains insertion order for consistent iteration behavior.


        Examples:
         - {"name": "John", "age": 30} - string keys with mixed values
         - {1: "one", 2: "two"} - number keys with string values
         - {"nested": {"inner": "value"}} - nested dictionaries
    v1DictionaryEntry:
      type: object
      properties:
        key:
          $ref: "#/components/schemas/v1HashableValue"
        value:
          $ref: "#/components/schemas/commonV1Value"
      description: |-
        Represents a single key-value pair within a Dictionary.

        Both key and value can be any Value type, though keys should be
        hashable types for proper dictionary behavior. Non-hashable keys
        (like lists or dictionaries) may cause runtime errors.
    v1HashableValue:
      type: object
      properties:
        bool_value:
          type: boolean
          title: Boolean true/false value
        number:
          $ref: "#/components/schemas/v1Number"
        text:
          type: string
          title: UTF-8 encoded text string
        date:
          $ref: "#/components/schemas/typeDate"
        timeofday:
          $ref: "#/components/schemas/typeTimeOfDay"
        datetime:
          $ref: "#/components/schemas/typeDateTime"
        duration:
          type: string
          title: Signed duration representing a span of time
      description: |-
        Represents a hashable value that can be used as a dictionary key.

        This message contains only the hashable types from the Value message,
        corresponding to Python's hashable types. These types can be safely
        used as keys in maps and dictionaries.

        Hashable types include: bool, Number, string, Date, TimeOfDay, DateTime
        and Duration.
    typeDate:
      type: object
      properties:
        year:
          type: integer
          format: int32
          description: >-
            Year of the date. Must be from 1 to 9999, or 0 to specify a date
            without

            a year.
        month:
          type: integer
          format: int32
          description: >-
            Month of a year. Must be from 1 to 12, or 0 to specify a year
            without a

            month and day.
        day:
          type: integer
          format: int32
          description: >-
            Day of a month. Must be from 1 to 31 and valid for the year and
            month, or 0

            to specify a year by itself or a year and month where the day isn't

            significant.
      description: >-
        * A full date, with non-zero year, month, and day values

        * A month and day value, with a zero year, such as an anniversary

        * A year on its own, with zero month and day values

        * A year and month value, with a zero day, such as a credit card expiration

        date


        Related types are [google.type.TimeOfDay][google.type.TimeOfDay] and

        `google.protobuf.Timestamp`.
      title: >-
        Represents a whole or partial calendar date, such as a birthday. The
        time of

        day and time zone are either specified elsewhere or are insignificant. The

        date is relative to the Gregorian Calendar. This can represent one of the

        following:
    v1List:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/commonV1Value"
          title: The ordered sequence of values in this list
      description: >-
        Represents an ordered collection of values (similar to arrays or lists).


        This message can contain any number of Value elements in a specific order.

        Lists are mutable and can grow or shrink during runtime. Elements can be

        accessed by their zero-based index position.


        Examples:
         - [1, 2, 3] - list of numbers
         - ["hello", "world"] - list of strings
         - [true, 42, "mixed"] - list with mixed types
         - [[1, 2], [3, 4]] - nested lists
    v1Set:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/v1HashableValue"
          title: |-
            The unique elements stored in this set
            All elements must be hashable types
      description: >-
        Represents an unordered collection of unique values.


        This message stores a collection of unique elements, where duplicate values

        are automatically removed. Only hashable types can be stored in sets.

        Sets are useful for membership testing, removing duplicates, and mathematical

        set operations like union, intersection, and difference.


        The set does not maintain insertion order - elements may appear in any order

        during iteration.


        Examples:
         - {1, 2, 3} - set of numbers
         - {"apple", "banana", "cherry"} - set of strings
         - {true, false} - set of booleans
         - {1, "hello", true} - set with mixed hashable types
    v1AutomationStage:
      type: string
      enum:
        - AUTOMATION_STAGE_UNSPECIFIED
        - AUTOMATION_STAGE_DRAFT
        - AUTOMATION_STAGE_PUBLISHED
      default: AUTOMATION_STAGE_UNSPECIFIED
      description: >-
        AutomationStage represents the publication stage of an automation.

        This enum is shared across services that manage or execute automations.

         - AUTOMATION_STAGE_UNSPECIFIED: Automation stage is not specified.
         - AUTOMATION_STAGE_DRAFT: Automation is in draft stage and can be modified.
         - AUTOMATION_STAGE_PUBLISHED: Automation is published and immutable, ready for execution.
    v1ExecutionStarted:
      type: object
      description: ExecutionStarted indicates that Jarvis has started the execution.
    v1PatchedNodeExecuted:
      type: object
      properties:
        patch_location:
          $ref: "#/components/schemas/commonV1Location"
        node_location:
          $ref: "#/components/schemas/commonV1Location"
        inputs:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/commonV1Value"
          description: |-
            The input variables & their values
            A variable is defined as an input if it was fetched
            from the memory while executing the node or one of its
            children.
        outputs:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/commonV1Value"
          description: |-
            The output variables & their values
            A variable is defined as an output if it was written to
            the memory while executing the node or one of its
            children.
            If a variable was written multiple times, only the last
            written value is considered as the output.
        error:
          type: array
          items:
            $ref: "#/components/schemas/v1ExecutionError"
          description: |-
            The list of all the errors that occurred while executing the
            node or any of its children.
        node_id:
          type: string
          title: The id of the patched node for which execution is completed
        book_function_call:
          $ref: "#/components/schemas/v1BookFunctionCall"
        node_kind:
          type: string
          title: The kind/type of the patched node that was executed
      title: Event emitted after executing a node inside a patch, with I/O and errors
    v1BookFunctionCall:
      type: object
      properties:
        book_function:
          $ref: "#/components/schemas/v1BookFunction"
        inputs:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/commonV1Value"
          title: The input variables and their values passed to the book function
        output:
          $ref: "#/components/schemas/commonV1Value"
      description: BookFunctionCall represents a call to an external book function
        with its inputs and outputs.
    v1BookFunction:
      type: object
      properties:
        connection_spy_identifier:
          type: string
          title: The connection name for the book instance in the spy code
        book_name:
          type: string
          title: The name of the target book containing the function
        function_name:
          type: string
          title: The name of the specific function to invoke within the book
        code_location:
          $ref: "#/components/schemas/commonV1Location"
      description: BookFunction represents a reference to an external book function.
    commonV1Location:
      type: object
      properties:
        start_byte:
          type: string
          format: int64
          title: Starting Byte of the span, It will be zero-based
        end_byte:
          type: string
          format: int64
          title: Ending Byte(exclusive) of the span, It will be zero-based
      description: >-
        Location represents a generic span within some underlying content.

        It specifies the starting byte offset and the ending byte offset (exclusive) of the span.

        This can be used for pointing to regions in files, buffers, logs, messages,

        or any other byte-addressable resource.
    v1ExecutionError:
      type: object
      properties:
        id:
          type: string
          title: Unique identifier for the error
        description:
          type: string
          title: Human-readable description of what went wrong
        context:
          $ref: "#/components/schemas/v1Context"
        extra:
          type: object
          additionalProperties:
            type: string
          title: Extra information about the error
        code:
          type: string
          title: >-
            The code where the error was raised (includes patches)

            If the error was raised in a patch, the code reflects the patched code

            and the error location is relative to the patched code instead of the original

            code

            Note: this field does not include previous patches that executed successfully
      description: ExecutionError represents an error that occurred during execution.
    v1Context:
      type: object
      properties:
        code_location:
          $ref: "#/components/schemas/commonV1Location"
        node_id:
          type: string
          title: The id of node
      description: |-
        Context provides additional information about the execution environment,
        such as stack traces for debugging purposes.
    v1NodeExecuted:
      type: object
      properties:
        code_location:
          $ref: "#/components/schemas/commonV1Location"
        inputs:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/commonV1Value"
          description: |-
            The input variables & their values
            A variable is defined as an input if it was fetched
            from the memory while executing the node or one of its
            children.
        outputs:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/commonV1Value"
          description: |-
            The output variables & their values
            A variable is defined as an output if it was written to
            the memory while executing the node or one of its
            children.
            If a variable was written multiple times, only the last
            written value is considered as the output.
        error:
          type: array
          items:
            $ref: "#/components/schemas/v1ExecutionError"
          description: |-
            The list of all the errors that occurred while executing the
            node or any of its children.
        node_id:
          type: string
          title: The id of the node that got executed
        book_function_call:
          $ref: "#/components/schemas/v1BookFunctionCall"
        node_kind:
          type: string
          title: The kind/type of the node that was executed
      title: Event emitted after Jarvis finishes executing an AST node, with I/O and
        errors
    v1NodeStarted:
      type: object
      properties:
        code_location:
          $ref: "#/components/schemas/commonV1Location"
        node_id:
          type: string
          title: The id of the node that was started
        node_kind:
          type: string
          title: The kind/type of the node that was started
      title: Event emitted when Jarvis begins executing an AST node
    v1PatchedNodeStarted:
      type: object
      properties:
        patch_location:
          $ref: "#/components/schemas/commonV1Location"
        node_location:
          $ref: "#/components/schemas/commonV1Location"
        node_id:
          type: string
          title: The id of the patched node for which execution is starting
        node_kind:
          type: string
          title: The kind/type of the patched node that is being started
      title: Event emitted when Jarvis starts executing a node inside a patch
    v1ExecutionFailed:
      type: object
      properties:
        error:
          $ref: "#/components/schemas/v1ExecutionError"
      description: |-
        ExecutionFailed indicates that the execution encountered an error and
        could not complete successfully.
    v1NodePatched:
      type: object
      properties:
        code_location:
          $ref: "#/components/schemas/commonV1Location"
        code_patch:
          type: string
          title: The patch SPy code that was applied
        inputs_patch:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/commonV1Value"
          title: The execution inputs that were patched
        connections:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/v1BookConnection"
          title: |-
            The book connections that were patched
            The key is the name of the connection used in the SPy code
            The value contains the connection details
        node_id:
          type: string
          title: The id of the node
        node_kind:
          type: string
          title: The kind/type of the node that was patched
      title: Event emitted when a patch is applied to an AST node
    v1BookConnection:
      type: object
      properties:
        connection_id:
          type: string
          description: Unique identifier for this connection resource.
        endpoint:
          type: string
          description: Endpoint for the connection.
      description: >-
        BookConnection is a resource representing a connection to a book
        instance.

        A connection has a unique identifier and an endpoint.
    v1ExecutionStopped:
      type: object
      properties:
        user_stopped:
          $ref: "#/components/schemas/v1UserStopped"
        waiting_on_book:
          $ref: "#/components/schemas/v1WaitingOnBook"
        waiting_on_timer:
          $ref: "#/components/schemas/v1WaitingOnTimer"
        program_stopped:
          $ref: "#/components/schemas/v1ProgramStopped"
      description: >-
        ExecutionStopped indicates that the execution was stopped before
        completion due to

        a specific reason.
    v1ProgramStopped:
      type: object
      properties:
        reason:
          type: string
          description: The reason the program was stopped.
      description: ProgramStopped indicates that the execution was stopped by the program.
    v1UserStopped:
      type: object
      description: UserStopped indicates that the execution was stopped by a user.
    v1WaitingOnTimer:
      type: object
      properties:
        duration:
          type: string
          description: The duration of the timer.
      description: |-
        WaitingOnTimer indicates that the execution is stopped because its
        waiting for a timer to fire. The run manager is expected to resume the
        execution when the timer fires.
    v1WaitingOnBook:
      type: object
      description: >-
        WaitingOnBook indicates that the execution is stopped because its

        waiting on an async book procedure to complete. The run manager is expected

        to resume the execution when the book procedure completes.
    v1NodeSkipped:
      type: object
      properties:
        code_location:
          $ref: "#/components/schemas/commonV1Location"
        node_id:
          type: string
          title: The id of the node that was skipped
        node_kind:
          type: string
          title: The kind/type of the node that was skipped
      title: Event emitted when Jarvis skips executing an AST node
    v1RunUpdate:
      type: object
      properties:
        run:
          $ref: "#/components/schemas/v1Run"
      description: RunUpdate represents a single update to a run's state.
    v1Run:
      type: object
      properties:
        name:
          type: string
          title: >-
            The name of the run.

            Format: organizations/{organization}/workspaces/{workspace}/automations/{automation}/runs/{run}
        executable_steps:
          $ref: "#/components/schemas/v1ExecutableSteps"
        create_time:
          type: string
          format: date-time
          description: |-
            The timestamp when this run was created.
            Set automatically when the run is first submitted to the system.
          readOnly: true
        state:
          $ref: "#/components/schemas/v1RunState"
        update_time:
          type: string
          format: date-time
          description: |-
            The timestamp when this run was updated.
            Set automatically when the run is updated.
          readOnly: true
        previous_run:
          type: string
          title: >-
            The name of the previous run in the chain, if applicable.

            Execution details of the previous run may be used to avoid re-computation.

            Format: organizations/{organization}/workspaces/{workspace}/automations/{automation}/runs/{run}
        stage:
          $ref: "#/components/schemas/v1AutomationStage"
        stage_version:
          type: string
          description: The version of the automation stage at the time this run was created.
        invocation_details:
          $ref: "#/components/schemas/v1InvocationDetails"
        user_inputs:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/commonV1Value"
          description: The user inputs provided to the run during pre phase and will be
            available for the UI to display the user inputs.
      description: >-
        Run represents a single execution instance of code in the Jeeves
        platform.

        Contains the executable code, metadata, and current execution state.
      required:
        - stage
        - stage_version
    v1InvocationDetails:
      type: object
      properties:
        trigger_id:
          type: string
          description: The ID of the trigger that initiated this run, if applicable.
        user_id:
          type: string
          description: The ID of the user that initiated this run, if applicable.
        invocation_source:
          $ref: "#/components/schemas/v1InvocationSource"
      description: InvocationDetails contains additional information about the entity
        that initiated a run.
    v1InvocationSource:
      type: string
      enum:
        - INVOCATION_SOURCE_UNSPECIFIED
        - INVOCATION_SOURCE_MANUAL
        - INVOCATION_SOURCE_TRIGGER
        - INVOCATION_SOURCE_SCHEDULE
      default: INVOCATION_SOURCE_UNSPECIFIED
      description: |-
        InvocationSource identifies the entity responsible for creating a run.

         - INVOCATION_SOURCE_UNSPECIFIED: Unspecified invocation source.
         - INVOCATION_SOURCE_MANUAL: Run was manually initiated by a user.
         - INVOCATION_SOURCE_TRIGGER: Run was triggered by an event or trigger.
         - INVOCATION_SOURCE_SCHEDULE: Run was initiated by a schedule.
    v1RunState:
      type: object
      properties:
        pending:
          $ref: "#/components/schemas/v1PendingRunState"
        executing:
          $ref: "#/components/schemas/v1ExecutingRunState"
        stopping:
          $ref: "#/components/schemas/v1StoppingRunState"
        stopped:
          $ref: "#/components/schemas/v1StoppedRunState"
        awaiting_guidance:
          $ref: "#/components/schemas/v1AwaitingGuidanceRunState"
        completed:
          $ref: "#/components/schemas/v1CompletedRunState"
        failed:
          $ref: "#/components/schemas/v1FailedRunState"
        update_time:
          type: string
          format: date-time
          description: The timestamp when the run transitioned to this state.
          readOnly: true
      description: |-
        RunState represents the overall lifecycle state of a run.
        Tracks the run from initial submission through completion or failure.
    v1AwaitingGuidanceRunState:
      type: object
      properties:
        exception:
          type: string
          title: ID of the exception (from guidance center)
          readOnly: true
        description:
          type: string
          description: Description of the exception that occured.
          readOnly: true
        location:
          $ref: "#/components/schemas/commonV1Location"
      description: |-
        Run is waiting for external guidance or user input.
        Requires manual intervention or external decision to proceed.
    v1FailedRunState:
      type: object
      properties:
        id:
          type: string
          description: The unique identifier of the error that caused the run to fail.
          readOnly: true
        description:
          type: string
          description: The description of the error.
          readOnly: true
        location:
          $ref: "#/components/schemas/commonV1Location"
      description: |-
        Run has failed due to an error.
        Execution stopped due to an unrecoverable error condition.
    v1StoppedRunState:
      type: object
      properties:
        reason:
          type: string
          description: The reason provided by the user for stopping the run.
          readOnly: true
      description: |-
        Run has been stopped and can be resumed later.
        Execution is temporarily stopped but can continue from current state.
    v1StoppingRunState:
      type: object
      properties:
        reason:
          type: string
          description: The reason provided by the user for stopping the run.
          readOnly: true
      description: |-
        Run is in the process of being stopped.
        Execution is stopping gracefully and will transition to STOPPED state.
    v1CompletedRunState:
      type: object
      properties:
        outputs:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/commonV1Value"
          description: The outputs of the run.
          readOnly: true
      description: |-
        Run has completed successfully.
        All code has been executed and results are available.
    v1PendingRunState:
      type: object
      description: |-
        Run has been submitted and is waiting to start execution.
        The run is queued and will begin when resources become available.
    v1ExecutingRunState:
      type: object
      description: |-
        Run is currently being executed.
        Code is actively running and making progress.
    v1ExecutableSteps:
      type: object
      properties:
        inputs:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/commonV1Value"
          description: |-
            Input parameters for the execution, provided as name-value pairs.
            These variables will be available to the code during execution.
        executables:
          type: array
          items:
            $ref: "#/components/schemas/v1ExecutableStep"
          description: The source code to be executed, written in SPy (Simplified Python)
            language.
      description: >-
        ExecutableSteps represents a sequence of steps of execution of a run.
        Each step is

        a separate computable unit with its own code, book connections and optional inputs.

        The first step may optionally have an input provided to it when the run is invoked.

        The output of each step becomes the input of the next step and the output of the

        last step becomes the output of the run.
      required:
        - executables
    v1ExecutableStep:
      type: object
      properties:
        code:
          type: string
          description: >-
            The source code to be executed, written in SPy (Simplified Python)
            language.

            This is the main logic that will be interpreted and run by the execution engine.
        book_connections:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/v1BookConnection"
          description: |-
            Book connections required by this executable.
            Maps connection names to their specific ID and endpoints.
        phase_type:
          $ref: "#/components/schemas/v1AutomationPhaseType"
      description: >-
        ExecutableStep represents a piece of code that can be executed in the
        Jeeves platform.

        Contains the source code, input parameters, and external dependencies needed for execution.
      required:
        - code
        - phase_type
    v1AutomationPhaseType:
      type: string
      enum:
        - AUTOMATION_PHASE_TYPE_UNSPECIFIED
        - AUTOMATION_PHASE_TYPE_PRE
        - AUTOMATION_PHASE_TYPE_MAIN
        - AUTOMATION_PHASE_TYPE_POST
      default: AUTOMATION_PHASE_TYPE_UNSPECIFIED
      description: |-
        PhaseType defines the type of phase for an automation trigger.

         - AUTOMATION_PHASE_TYPE_UNSPECIFIED: Unspecified phase type.
         - AUTOMATION_PHASE_TYPE_PRE: Pre-processing phase.
         - AUTOMATION_PHASE_TYPE_MAIN: Main processing phase.
         - AUTOMATION_PHASE_TYPE_POST: Post-processing phase.
    v2Expression:
      type: object
      properties:
        binary_expression:
          $ref: "#/components/schemas/v2BinaryExpression"
        unary_expression:
          $ref: "#/components/schemas/v2UnaryExpression"
        value_expression:
          $ref: "#/components/schemas/bdkV2Value"
        noun_phrases_expression:
          $ref: "#/components/schemas/v2NounPhrases"
    v2UnaryExpression:
      type: object
      properties:
        operator:
          $ref: "#/components/schemas/v2UnaryOperator"
        inner:
          $ref: "#/components/schemas/v2Expression"
    v2UnaryOperator:
      type: string
      enum:
        - UnaryOperatorNot
        - UnaryOperatorExists
      default: UnaryOperatorNot
    v2BinaryExpression:
      type: object
      properties:
        operator:
          $ref: "#/components/schemas/v2BinaryOperator"
        left:
          $ref: "#/components/schemas/v2Expression"
        right:
          $ref: "#/components/schemas/v2Expression"
    v2BinaryOperator:
      type: string
      enum:
        - BinaryOperatorAnd
        - BinaryOperatorOr
        - BinaryOperatorEquals
        - BinaryOperatorNotEquals
        - BinaryOperatorIn
        - BinaryOperatorHas
        - BinaryOperatorLessThan
        - BinaryOperatorGreaterThan
        - BinaryOperatorLessThanOrEqual
        - BinaryOperatorGreaterThanOrEqual
      default: BinaryOperatorAnd
    bdkV2Value:
      type: object
      properties:
        null_value:
          type: string
        conceptual_value:
          $ref: "#/components/schemas/v2NounPhrase"
        text_value:
          type: string
          title: "deprecated: use offloadable_text_value (15) for new code"
        number_value:
          type: number
          format: double
        boolean_value:
          type: boolean
        datetime_value:
          type: string
          format: date-time
        date_value:
          $ref: "#/components/schemas/v2Date"
        time_value:
          $ref: "#/components/schemas/v2Time"
        file_value:
          $ref: "#/components/schemas/v2FileValue"
        dictionary_value:
          $ref: "#/components/schemas/v2DictionaryValue"
        list_value:
          $ref: "#/components/schemas/bdkV2ListValue"
        opaque_value:
          $ref: "#/components/schemas/v2OpaqueValue"
        table_value:
          $ref: "#/components/schemas/v2TableValue"
        sensitive_value:
          $ref: "#/components/schemas/v2SensitiveValue"
        offloadable_text_value:
          $ref: "#/components/schemas/v2OffloadableTextValue"
        offloadable_dictionary_value:
          $ref: "#/components/schemas/v2OffloadableDictionaryValue"
        offloadable_list_value:
          $ref: "#/components/schemas/v2OffloadableListValue"
      title: A union of all possible values
    v2DictionaryValue:
      type: object
      properties:
        fields:
          type: array
          items:
            $ref: "#/components/schemas/v2DictionaryValueField"
          title: All the fields alongside their values in the dictionary
        is_a:
          type: array
          items:
            $ref: "#/components/schemas/v2NounPhrase"
          title: Is a replationships for the dictionary
      title: Value to be used when the type is dictionary
    v2DictionaryValueField:
      type: object
      properties:
        key:
          type: string
        value:
          $ref: "#/components/schemas/bdkV2Value"
      title: Each key-value pair inside a dictionary
    v2NounPhrase:
      type: object
      properties:
        modifiers:
          type: array
          items:
            type: string
          title: Optional adjectives attached to the noun
        head:
          type: string
          title: Noun of the phrase
    bdkV2ListValue:
      type: object
      properties:
        values:
          type: array
          items:
            $ref: "#/components/schemas/bdkV2Value"
          title: All the values inside the list
      title: A collection of values
    v2TableValue:
      type: object
      properties:
        remote:
          type: string
        inline:
          $ref: "#/components/schemas/v2Table"
      title: >-
        A table that is represented remote as an URL to a file that is
        Feather-formatted

        or inline via the Table message
    v2Table:
      type: object
      properties:
        columns:
          type: array
          items:
            $ref: "#/components/schemas/v2Column"
      description: >-
        A table is a column-oriented structure. All the values inside each
        column must

        be of equal length.
    v2Column:
      type: object
      properties:
        values:
          type: array
          items:
            $ref: "#/components/schemas/bdkV2Value"
        name:
          type: string
    v2FileValue:
      type: object
      properties:
        remote:
          type: string
        inline:
          $ref: "#/components/schemas/v2File"
      title: A file value represents a file that can be either inline or remote
    v2File:
      type: object
      properties:
        file_name:
          type: string
          title: The name of the file
        content:
          type: string
          format: byte
          title: Content of the file as a byte stream
    v2Date:
      type: object
      properties:
        year:
          type: integer
          format: int32
          title: Year of the date
        month:
          type: integer
          format: int32
          title: Month of a year
        day:
          type: integer
          format: int32
          title: Day of a month
    v2OffloadableTextValue:
      type: object
      properties:
        remote:
          type: string
        inline:
          type: string
      title: A text value that can be either inline or stored remotely
    v2SensitiveValue:
      type: object
      properties:
        value:
          $ref: "#/components/schemas/bdkV2Value"
      title: A sensitive value is any value marked as sensitive (to prevent exposure)
    v2OpaqueValue:
      type: object
      properties:
        content:
          type: string
          format: byte
          title: Content of the opaque value
        is_a:
          type: array
          items:
            $ref: "#/components/schemas/v2NounPhrase"
          title: Is a replationships for the opaque
    v2OffloadableListValue:
      type: object
      properties:
        remote:
          type: string
        inline:
          $ref: "#/components/schemas/bdkV2ListValue"
      title: A list value that can be either inline or stored remotely
    v2OffloadableDictionaryValue:
      type: object
      properties:
        remote:
          type: string
        inline:
          $ref: "#/components/schemas/v2DictionaryValue"
      title: A dictionary value that can be either inline or stored remotely
    v2Time:
      type: object
      properties:
        hours:
          type: integer
          format: int32
          title: Hours of day
        minutes:
          type: integer
          format: int32
          title: Minutes of hour of day
        seconds:
          type: integer
          format: int32
          title: Seconds of minutes of the time
        nanos:
          type: integer
          format: int32
          title: Fractions of seconds in nanoseconds
    v2NounPhrases:
      type: object
      properties:
        noun_phrases:
          type: array
          items:
            $ref: "#/components/schemas/v2NounPhrase"
    v2BookConnectionResponse:
      type: object
      properties:
        book_connection_descriptor:
          $ref: "#/components/schemas/v2BookConnectionDescriptor"
        authorize_url:
          $ref: "#/components/schemas/v2BookConnectionOAuthURLResponse"
      title: The response to an add/update book connection request
    v2BookConnectionDescriptor:
      type: object
      properties:
        book_name:
          type: string
          title: The name of the book
        book_version:
          type: string
          title: The version of the book
        connection_id:
          type: string
          title: The connection id of the book
        connection_name:
          type: string
          title: The connection name
        authentication:
          $ref: "#/components/schemas/v2Authentication"
        config:
          type: array
          items:
            $ref: "#/components/schemas/v2ConceptValue"
          title: "Input config concepts. Note: replaced by config_map"
        labels:
          type: array
          items:
            $ref: "#/components/schemas/bdkV2Label"
          title: Labels associated with the connection
        status:
          $ref: "#/components/schemas/v2BookConnectionStatus"
        endpoint:
          type: string
          title: The endpoint of the connection
        discovered:
          type: array
          items:
            type: string
          title: The list of things that have been discovered
        config_map:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/bdkV2Value"
          title: Configured values
    bdkV2Label:
      type: object
      properties:
        key:
          type: string
          title: The key of the key-value pair
        value:
          type: string
          title: The value of the key-value pair
    v2ConceptValue:
      type: object
      properties:
        noun_phrases:
          $ref: "#/components/schemas/v2NounPhrases"
        value:
          $ref: "#/components/schemas/bdkV2Value"
    v2Authentication:
      type: object
      properties:
        authentication_id:
          type: string
          title: Identifier of the authentication method to be used for testing the
            connection
        authentication_credentials:
          type: array
          items:
            $ref: "#/components/schemas/v2CredentialValue"
          title: Credentials
    v2CredentialValue:
      type: object
      properties:
        id:
          type: string
          title: Id of the credential
        value:
          $ref: "#/components/schemas/bdkV2Value"
    v2BookConnectionStatus:
      type: object
      properties:
        state:
          $ref: "#/components/schemas/v2BookConnectionState"
        state_category:
          $ref: "#/components/schemas/v2BookConnectionStateCategory"
        reason:
          type: string
          title: Human-readable message providing additional details about the current
            state
        last_updated:
          type: string
          title: RFC 3339 timestamp of when the status was last updated
        conditions:
          type: array
          items:
            $ref: "#/components/schemas/v2BookConnectionCondition"
          title: List of conditions that apply to the BookConnection
      title: Status information for a BookConnection
    v2BookConnectionStateCategory:
      type: string
      enum:
        - BOOK_CONNECTION_STATE_CATEGORY_WARNING
        - BOOK_CONNECTION_STATE_CATEGORY_READY
        - BOOK_CONNECTION_STATE_CATEGORY_FAILED
      default: BOOK_CONNECTION_STATE_CATEGORY_WARNING
      title: The category/level of the connection state
    v2BookConnectionState:
      type: string
      enum:
        - BOOK_CONNECTION_STATE_PENDING
        - BOOK_CONNECTION_STATE_READY
        - BOOK_CONNECTION_STATE_FAILED
        - BOOK_CONNECTION_STATE_CONDITIONS_NOT_MET
        - BOOK_CONNECTION_STATE_UNKNOWN
      default: BOOK_CONNECTION_STATE_PENDING
      title: Possible phases for a BookConnection (Pending, ConditionsNotMet, Ready,
        Failed, Unknown)
    v2BookConnectionCondition:
      type: object
      properties:
        type:
          $ref: "#/components/schemas/v2BookConnectionConditionType"
        status:
          $ref: "#/components/schemas/v2BookConnectionConditionStatus"
        last_transition_time:
          type: string
          title: RFC 3339 timestamp of when this condition was last updated
        reason:
          type: string
          title: Brief reason explaining the condition
        reason_code:
          $ref: "#/components/schemas/v2BookConnectionConditionReasonCode"
      title: Condition information for BookConnection
    v2BookConnectionConditionStatus:
      type: string
      enum:
        - BOOK_CONNECTION_CONDITION_STATUS_TRUE
        - BOOK_CONNECTION_CONDITION_STATUS_FALSE
        - BOOK_CONNECTION_CONDITION_STATUS_UNKNOWN
        - BOOK_CONNECTION_CONDITION_STATUS_PENDING
      default: BOOK_CONNECTION_CONDITION_STATUS_TRUE
      description: >-
        Possible Values:
         - True: All good
         - False: An error occurred
         - Unknown: Condition not applicable/relevant
         - Pending: Underlying process (upon which the condition depends) still ongoing
      title: Status values for conditions
    v2BookConnectionConditionReasonCode:
      type: string
      enum:
        - BOOK_CONNECTION_CONDITION_REASON_CODE_BOOK_LOOKUP_FAILED
        - BOOK_CONNECTION_CONDITION_REASON_CODE_BOOK_NOT_FOUND
        - BOOK_CONNECTION_CONDITION_REASON_CODE_BOOK_MISSING_IMAGE
        - BOOK_CONNECTION_CONDITION_REASON_CODE_BOOK_RUNTIME_VERSION_OUTDATED
        - BOOK_CONNECTION_CONDITION_REASON_CODE_AUTHENTICATION_ID_NOT_FOUND
        - BOOK_CONNECTION_CONDITION_REASON_CODE_MISSING_CREDENTIAL
        - BOOK_CONNECTION_CONDITION_REASON_CODE_WRONG_CREDENTIAL_TYPE
        - BOOK_CONNECTION_CONDITION_REASON_CODE_SECRET_NOT_FOUND
        - BOOK_CONNECTION_CONDITION_REASON_CODE_SECRET_MISSING_KEY
        - BOOK_CONNECTION_CONDITION_REASON_CODE_AUTHENTICATION_REQUIRED_MISSING
        - BOOK_CONNECTION_CONDITION_REASON_CODE_AUTHENTICATION_TEST_FAILED
        - BOOK_CONNECTION_CONDITION_REASON_CODE_TOKEN_REFRESH_FAILED
        - BOOK_CONNECTION_CONDITION_REASON_CODE_CONFIGURATION_UNKNOWN_KEY
        - BOOK_CONNECTION_CONDITION_REASON_CODE_CONFIGURATION_WRONG_TYPE
        - BOOK_CONNECTION_CONDITION_REASON_CODE_REPLICA_COUNT_IS_ZERO
        - BOOK_CONNECTION_CONDITION_REASON_CODE_NEW_DEPLOYMENT_ROLLED_OUT
        - BOOK_CONNECTION_CONDITION_REASON_CODE_DISCOVER_IN_PROGRESS
        - BOOK_CONNECTION_CONDITION_REASON_CODE_DISCOVER_FAILED
      default: BOOK_CONNECTION_CONDITION_REASON_CODE_BOOK_LOOKUP_FAILED
      description: >-
        - BOOK_CONNECTION_CONDITION_REASON_CODE_BOOK_LOOKUP_FAILED: Book related
         - BOOK_CONNECTION_CONDITION_REASON_CODE_AUTHENTICATION_ID_NOT_FOUND: Authentication related
         - BOOK_CONNECTION_CONDITION_REASON_CODE_CONFIGURATION_UNKNOWN_KEY: Configuration related
         - BOOK_CONNECTION_CONDITION_REASON_CODE_REPLICA_COUNT_IS_ZERO: Connection related
         - BOOK_CONNECTION_CONDITION_REASON_CODE_DISCOVER_IN_PROGRESS: Discover related
      title: Machine-readable reason codes for condition transitions
    v2BookConnectionConditionType:
      type: string
      enum:
        - BOOK_CONNECTION_CONDITION_TYPE_BOOK_VALID
        - BOOK_CONNECTION_CONDITION_TYPE_AUTHENTICATION_VALID
        - BOOK_CONNECTION_CONDITION_TYPE_CONFIGURATION_VALID
        - BOOK_CONNECTION_CONDITION_TYPE_DEPLOYMENT_READY
        - BOOK_CONNECTION_CONDITION_TYPE_CREDENTIALS_VALID
        - BOOK_CONNECTION_CONDITION_TYPE_DISCOVER_READY
        - BOOK_CONNECTION_CONDITION_TYPE_TRIGGER_INSTANCES_READY
        - BOOK_CONNECTION_CONDITION_TYPE_COMPATIBLE_RUNTIME_VERSION
      default: BOOK_CONNECTION_CONDITION_TYPE_BOOK_VALID
      description: >-
        Represents the various condition types that can be associated with a
        BookConnection.


        Conditions are categorized into two groups:


        1. [Static Conditions] These conditions are determined solely by the BookConnection's data structure
           and configuration, and they can be validated without external dependencies or runtime state:
           - BOOK_VALID
           - AUTHENTICATION_VALID
           - CONFIGURATION_VALID

        2. [Dynamic Conditions] These conditions depend on external factors and runtime state that can change
           independently of the BookConnection spec. They require active monitoring and periodic re-evaluation:
           - DEPLOYMENT_READY
           - CREDENTIALS_VALID
           - DISCOVER_READY
           - TRIGGER_INSTANCES_READY
           - COMPATIBLE_RUNTIME_VERSION

         - BOOK_CONNECTION_CONDITION_TYPE_BOOK_VALID: Static
         - BOOK_CONNECTION_CONDITION_TYPE_DEPLOYMENT_READY: Dynamic
    v2BookConnectionOAuthURLResponse:
      type: object
      properties:
        url:
          type: string
          title: |-
            The URL to kick off the OAuth flow. It contains:
            - The authorize endpoint
            - The state
            - The scope
            - The redirect uri
    v1ListAutomationsResponse:
      type: object
      properties:
        automations:
          type: array
          items:
            $ref: "#/components/schemas/v1Automation"
          description: |-
            The list of automations for the current page.
            May be empty if no automations match the request criteria.
        next_page_token:
          type: string
          description: |-
            A token that can be sent as `page_token` to retrieve the next page.
            If this field is omitted, there are no subsequent pages.
      description: ListAutomationsResponse returns a page of automations and
        pagination information.
    v1Automation:
      type: object
      properties:
        name:
          type: string
          title: The automation name (e.g. 'automations/{automation}')
        display_name:
          type: string
          description: >-
            Human-readable name of the automation for identification and
            display.

            Must be unique within the user's namespace.
        english_code:
          type: string
          description: >-
            User-facing English description code that explains what the
            automation does.

            This is a human-readable representation of the automation's purpose and logic.
        code:
          type: string
          description: >-
            SPy (Subset-of Python) executable code that defines the automation
            logic.

            This code is executed when the automation is invoked with inputs.
        artifacts:
          type: object
          additionalProperties:
            type: string
            format: byte
          description: >-
            Additional artifacts associated with the automation (e.g., data
            files, configurations).

            Keys are artifact names, values are the binary content of the artifacts.

            These artifacts are available to the automation during execution.
        create_time:
          type: string
          format: date-time
          description: |-
            Timestamp when the automation was originally created.
            This value never changes after creation.
          readOnly: true
        version:
          type: string
          title: >-
            Semantic version of this specific version of the automation (format:
            major.minor).

            Incremented each time the automation is updated or published.

            Examples: "0.1", "1.0", "1.1", "2.0"
          readOnly: true
        connections:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/v1BookConnection"
          description: >-
            Book connections required by this automation for execution.

            Maps connection names to their metadata.

            These connections are resolved and made available during automation execution.
        update_time:
          type: string
          format: date-time
          description: >-
            Timestamp when the automation was last updated.

            Updated whenever the automation metadata, code, or dependencies change.
          readOnly: true
        update_user_id:
          type: string
          description: The ID of the user who last updated this automation.
          readOnly: true
        delete_time:
          type: string
          format: date-time
          description: Timestamp when the automation was deleted.
          readOnly: true
        purge_time:
          type: string
          format: date-time
          description: Timestamp when the automation will be purged.
          readOnly: true
        input_specs:
          type: array
          items:
            $ref: "#/components/schemas/v1AutomationInputSpec"
          description: >-
            List of input specifications that define the parameters this
            automation accepts.

            These specifications describe the expected inputs when the automation is executed.
        description:
          type: string
          description: Provides additional context and documentation about the
            automation's purpose and behavior.
        latest_published_version:
          type: string
          title: >-
            Semantic version of the latest published version of the automation
            (format: major.minor).

            It will be null in case of no published version.

            Examples: "0.1", "1.0", "2.0"
          readOnly: true
        author_id:
          type: string
          description: The ID of the user who created this automation.
          readOnly: true
        code_mapping:
          $ref: "#/components/schemas/v1CodeMapping"
        restore_time:
          type: string
          format: date-time
          description: |-
            Timestamp when the automation was restored from a previous version.
            Only populated if the automation has been restored.
          readOnly: true
        restore_version:
          type: string
          description: >-
            The version string this automation was restored from (e.g., "1.0",
            "2.1").

            Only populated if the automation has been restored.
          readOnly: true
        restore_user_id:
          type: string
          description: |-
            The ID of the user who restored this automation.
            Only populated if the automation has been restored.
          readOnly: true
        publish_time:
          type: string
          format: date-time
          description: |-
            Timestamp when the automation was last published.
            Only populated if the automation has been published.
          readOnly: true
        publish_user_id:
          type: string
          description: |-
            The ID of the user who last published this automation.
            Only populated if the automation has been published.
          readOnly: true
        activation_state:
          $ref: "#/components/schemas/v1AutomationActivationState"
        default_inputs:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/commonV1Value"
          description: >-
            Default input values for this automation.

            Keys are input parameter names (matching AutomationInputSpec.name),

            values are the default values to use when inputs are not explicitly provided.

            These are used to pre-populate inputs for manual runs and fill missing inputs

            for trigger-based invocations.
          readOnly: true
        marked_outputs:
          type: array
          items:
            type: string
          description: |-
            List of output keys that have been marked by the user.
            These keys identify specific outputs from the automation execution.
      description: >-
        Automation represents a unit of executable code with associated metadata
        and dependencies.

        Automations can be in DRAFT or PUBLISHED state, where drafts can be modified and

        published automations are immutable and executable.

        Automation IDs are unique nano ID strings (21 characters, URL-safe: A-Za-z0-9_-).
      required:
        - display_name
    v1AutomationInputSpec:
      type: object
      properties:
        name:
          type: string
          description: The name of the input parameter.
        type:
          $ref: "#/components/schemas/v1ValueType"
      description: AutomationInputSpec defines the specification for an input
        parameter of an automation.
      required:
        - name
    v1ValueType:
      type: object
      properties:
        scalar_type:
          $ref: "#/components/schemas/v1ValueScalarType"
        optional_type:
          $ref: "#/components/schemas/v1ValueOptionalType"
        list_type:
          $ref: "#/components/schemas/v1ValueListType"
        dictionary_type:
          $ref: "#/components/schemas/v1ValueDictionaryType"
        table_type:
          $ref: "#/components/schemas/v1ValueTableType"
        opaque_type:
          $ref: "#/components/schemas/v1ValueOpaqueType"
        any_type:
          $ref: "#/components/schemas/v1ValueAnyType"
        union_type:
          $ref: "#/components/schemas/v1ValueUnionType"
        sensitive_type:
          $ref: "#/components/schemas/v1ValueSensitiveType"
        enum_type:
          $ref: "#/components/schemas/v1ValueEnumType"
        generic_dictionary_type:
          $ref: "#/components/schemas/v1ValueGenericDictionaryType"
      title: Represents a complete value type definition using a discriminated union
    v1ValueOpaqueType:
      type: object
      properties:
        is_a:
          type: string
          title: Semantic classification of what this opaque type represents
        description:
          type: string
          title: Optional human-readable description of this opaque type
      title: Represents an opaque value type with semantic meaning but unknown
        internal structure
    v1ValueListType:
      type: object
      properties:
        inner:
          $ref: "#/components/schemas/v1ValueType"
      title: Represents a list/array value type containing elements of a specific type
    v1ValueTableType:
      type: object
      properties:
        is_a:
          type: string
          title: Semantic classification of what this table represents
        columns:
          type: array
          items:
            $ref: "#/components/schemas/v1ValueTableTypeColumn"
          title: The columns that make up this table
        description:
          type: string
          title: Optional human-readable description of this table type
      title: Represents a table value type with structured columns
    v1ValueTableTypeColumn:
      type: object
      properties:
        key:
          type: string
          title: The name/key of this column
        value:
          $ref: "#/components/schemas/v1ValueType"
        description:
          type: string
          title: Optional human-readable description of this column
      title: Represents a single column within a table value type
    v1ValueSensitiveType:
      type: object
      properties:
        inner:
          $ref: "#/components/schemas/v1ValueType"
      title: Represents a value type that contains sensitive information
    v1ValueDictionaryType:
      type: object
      properties:
        is_a:
          type: string
          title: Semantic classification of what this dictionary represents
        fields:
          type: array
          items:
            $ref: "#/components/schemas/v1ValueDictionaryTypeField"
          title: The named fields contained in this dictionary
        description:
          type: string
          title: Optional human-readable description of this dictionary type
      title: Represents a dictionary/object value type with named fields
    v1ValueDictionaryTypeField:
      type: object
      properties:
        key:
          type: string
          title: The name/key of this field
        value:
          $ref: "#/components/schemas/v1ValueType"
        description:
          type: string
          title: Optional human-readable description of this field
      title: Represents a single field within a dictionary value type
    v1ValueUnionType:
      type: object
      properties:
        inners:
          type: array
          items:
            $ref: "#/components/schemas/v1ValueType"
          title: The possible value types in this union
      title: Represents a union value type that can be one of several possible types
    v1ValueOptionalType:
      type: object
      properties:
        inner:
          $ref: "#/components/schemas/v1ValueType"
      title: Represents a value type that can be optional (nullable)
    v1ValueGenericDictionaryType:
      type: object
      properties:
        key_type:
          $ref: "#/components/schemas/v1ValueType"
        value_type:
          $ref: "#/components/schemas/v1ValueType"
      title: Represent a generic dictionary that can hold any entry of a particular
        key and value type
    v1ValueAnyType:
      type: object
      title: Represents a value type that can hold any kind of value
    v1ValueScalarType:
      type: string
      enum:
        - VALUE_SCALAR_TYPE_UNSPECIFIED
        - VALUE_SCALAR_TYPE_TEXT
        - VALUE_SCALAR_TYPE_NUMBER
        - VALUE_SCALAR_TYPE_BOOLEAN
        - VALUE_SCALAR_TYPE_DATETIME
        - VALUE_SCALAR_TYPE_DATE
        - VALUE_SCALAR_TYPE_TIME
        - VALUE_SCALAR_TYPE_FILE
      default: VALUE_SCALAR_TYPE_UNSPECIFIED
      description: |-
        - VALUE_SCALAR_TYPE_UNSPECIFIED: Unspecified value type
         - VALUE_SCALAR_TYPE_TEXT: A text value type
         - VALUE_SCALAR_TYPE_NUMBER: A number value type
         - VALUE_SCALAR_TYPE_BOOLEAN: A boolean value type
         - VALUE_SCALAR_TYPE_DATETIME: A datetime value type
         - VALUE_SCALAR_TYPE_DATE: A date value type
         - VALUE_SCALAR_TYPE_TIME: A time value type
         - VALUE_SCALAR_TYPE_FILE: A file value type
      title: Supported Value Scalar Types
    v1ValueEnumType:
      type: object
      properties:
        is_a:
          type: string
          title: Semantic classification of what this enum represents
        members:
          type: array
          items:
            $ref: "#/components/schemas/v1ValueEnumTypeMember"
          title: The available options/members of this enum
        description:
          type: string
          title: Optional human-readable description of this enum type
      title: Represents an enumeration value type with predefined options
    v1ValueEnumTypeMember:
      type: object
      properties:
        name:
          type: string
          title: The programmatic name of this enum member
        description:
          type: string
          title: Optional human-readable description of this enum member
      title: Represents a single member/option within an enum value type
    v1CodeMapping:
      type: object
      properties:
        entries:
          type: array
          items:
            $ref: "#/components/schemas/v1CodeMappingEntry"
          description: >-
            List of mapping entries that associate SPy code regions with English
            code regions.

            Each entry defines a paired relationship between a span in the SPy code and

            a span in the English code representation.
      description: >-
        CodeMapping represents a bidirectional mapping between SPy
        (Subset-of-Python) code

        and English code locations within an automation. This mapping enables navigation between

        the two representations, facilitating debugging, traceability, and synchronized editing.

        Each entry in the mapping associates a region in the SPy code with its corresponding

        region in the English code. The mapping relationship is many-to-many and entries may

        overlap.
      required:
        - entries
    v1CodeMappingEntry:
      type: object
      properties:
        spy_location:
          $ref: "#/components/schemas/commonV1Location"
        english_location:
          $ref: "#/components/schemas/commonV1Location"
      description: >-
        CodeMappingEntry represents a single mapping between a region in SPy
        code and

        its corresponding region in English code. This bidirectional association allows

        navigation from SPy to English and vice versa, enabling synchronized views and

        debugging across both representations of the automation logic.
      required:
        - spy_location
        - english_location
    v1AutomationActivationState:
      type: string
      enum:
        - AUTOMATION_ACTIVATION_STATE_UNSPECIFIED
        - AUTOMATION_ACTIVATION_STATE_ACTIVE
        - AUTOMATION_ACTIVATION_STATE_DEACTIVATED
      default: AUTOMATION_ACTIVATION_STATE_UNSPECIFIED
      description: >-
        Activation state of a published automation.

        Controls whether the automation can execute published runs.

         - AUTOMATION_ACTIVATION_STATE_UNSPECIFIED: Unspecified state. Used when automation has no published version.
        Activation state is only meaningful after publishing.
         - AUTOMATION_ACTIVATION_STATE_ACTIVE: Automation is active and can execute published runs.
         - AUTOMATION_ACTIVATION_STATE_DEACTIVATED: Automation is deactivated and cannot execute published runs.
        Events will be logged but not executed.
    v1DisableAutomationScheduleResponse:
      type: object
      properties:
        schedule:
          $ref: "#/components/schemas/v1AutomationSchedule"
      description: DisableAutomationScheduleResponse contains the disabled schedule.
    v1AutomationSchedule:
      type: object
      properties:
        name:
          type: string
          title: >-
            Resource name of the schedule.

            Format: organizations/{org}/workspaces/{ws}/automations/{automation}/schedule
        config:
          $ref: "#/components/schemas/v1ScheduleConfig"
        enabled:
          type: boolean
          description: |-
            Whether the schedule is currently enabled.
            Disabled schedules do not trigger automation invocations.
          readOnly: true
        summary:
          type: string
          title: >-
            Human-readable summary of the schedule for display in the UI.

            Generated by the backend based on the schedule configuration.

            Examples: "Every weekday at 9:00 AM PT", "Monthly on the 4th Friday at 2:30 PM"
          readOnly: true
        next_run_times:
          type: array
          items:
            type: string
            format: date-time
          description: |-
            List of the next scheduled execution times.
            Useful for preview and verification. Backend generates these.
          readOnly: true
        remaining_occurrences:
          type: integer
          format: int32
          description: >-
            Number of remaining occurrences if the schedule has an end
            condition.

            Only populated when config.end.end_type is SCHEDULE_END_TYPE_AFTER_OCCURRENCES.
          readOnly: true
      description: >-
        AutomationSchedule represents a schedule for invoking an automation.

        Each automation can have at most one schedule. Kestra is the source of truth.
      required:
        - config
    v1ScheduleConfig:
      type: object
      properties:
        start:
          $ref: "#/components/schemas/v1ScheduleStart"
        repeat_interval:
          $ref: "#/components/schemas/v1RepeatInterval"
        weekly_pattern:
          $ref: "#/components/schemas/v1DayOfWeekPattern"
        monthly_pattern:
          $ref: "#/components/schemas/v1DayOfMonthPattern"
        yearly_pattern:
          $ref: "#/components/schemas/v1MonthPattern"
        active_window:
          $ref: "#/components/schemas/v1TimeWindow"
        end:
          $ref: "#/components/schemas/v1ScheduleEnd"
      description: >-
        ScheduleConfig is the main user-friendly configuration for automation
        schedules.

        The backend generates the appropriate scheduling logic from this configuration.
      required:
        - start
    v1ScheduleEnd:
      type: object
      properties:
        end_type:
          $ref: "#/components/schemas/v1ScheduleEndType"
        end_date:
          $ref: "#/components/schemas/typeDate"
        max_occurrences:
          type: integer
          format: int32
          description: >-
            Number of occurrences when end_type is
            SCHEDULE_END_TYPE_AFTER_OCCURRENCES.

            Schedule stops after this many executions.
      description: ScheduleEnd defines when the schedule stops running.
      required:
        - end_type
    v1ScheduleEndType:
      type: string
      enum:
        - SCHEDULE_END_TYPE_UNSPECIFIED
        - SCHEDULE_END_TYPE_NEVER
        - SCHEDULE_END_TYPE_ON_DATE
        - SCHEDULE_END_TYPE_AFTER_OCCURRENCES
      default: SCHEDULE_END_TYPE_UNSPECIFIED
      description: >-
        ScheduleEndType defines how a schedule terminates.

         - SCHEDULE_END_TYPE_UNSPECIFIED: Unspecified end type. Defaults to NEVER.
         - SCHEDULE_END_TYPE_NEVER: Schedule runs indefinitely (never ends).
         - SCHEDULE_END_TYPE_ON_DATE: Schedule ends on a specific date.
         - SCHEDULE_END_TYPE_AFTER_OCCURRENCES: Schedule ends after a specific number of occurrences.
    v1DayOfWeekPattern:
      type: object
      properties:
        days:
          type: array
          items:
            $ref: "#/components/schemas/v1DayOfWeek"
          description: |-
            Days of the week when the schedule should run.
            At least one day must be specified.
      description: |-
        DayOfWeekPattern specifies which days of the week to run.
        Used for weekly schedules (e.g., "every Monday", "every Mon/Wed/Fri").
      required:
        - days
    v1DayOfWeek:
      type: string
      enum:
        - DAY_OF_WEEK_UNSPECIFIED
        - DAY_OF_WEEK_MONDAY
        - DAY_OF_WEEK_TUESDAY
        - DAY_OF_WEEK_WEDNESDAY
        - DAY_OF_WEEK_THURSDAY
        - DAY_OF_WEEK_FRIDAY
        - DAY_OF_WEEK_SATURDAY
        - DAY_OF_WEEK_SUNDAY
      default: DAY_OF_WEEK_UNSPECIFIED
      description: |-
        DayOfWeek represents days of the week for scheduling.
        Values align with ISO 8601 (Monday = 1, Sunday = 7).

         - DAY_OF_WEEK_UNSPECIFIED: Unspecified day.
         - DAY_OF_WEEK_MONDAY: Monday.
         - DAY_OF_WEEK_TUESDAY: Tuesday.
         - DAY_OF_WEEK_WEDNESDAY: Wednesday.
         - DAY_OF_WEEK_THURSDAY: Thursday.
         - DAY_OF_WEEK_FRIDAY: Friday.
         - DAY_OF_WEEK_SATURDAY: Saturday.
         - DAY_OF_WEEK_SUNDAY: Sunday.
    v1DayOfMonthPattern:
      type: object
      properties:
        day_number:
          type: integer
          format: int32
          description: |-
            Run on a specific day of the month (1-31).
            If the month has fewer days, runs on the last day of that month.
        ordinal_day:
          $ref: "#/components/schemas/v1OrdinalDayOfWeek"
      description: |-
        DayOfMonthPattern specifies which day(s) of the month to run.
        Used for monthly schedules.
    v1OrdinalDayOfWeek:
      type: object
      properties:
        ordinal:
          $ref: "#/components/schemas/v1Ordinal"
        day:
          $ref: "#/components/schemas/v1DayOfWeek"
      description: >-
        OrdinalDayOfWeek represents a pattern like "first Monday" or "last
        Friday".

        Used as a building block for monthly and yearly patterns.
      required:
        - ordinal
        - day
    v1Ordinal:
      type: string
      enum:
        - ORDINAL_UNSPECIFIED
        - ORDINAL_FIRST
        - ORDINAL_SECOND
        - ORDINAL_THIRD
        - ORDINAL_FOURTH
        - ORDINAL_FIFTH
        - ORDINAL_LAST
      default: ORDINAL_UNSPECIFIED
      description: >-
        Ordinal represents the position within a period (e.g., "first Monday of
        month").

         - ORDINAL_UNSPECIFIED: Unspecified ordinal.
         - ORDINAL_FIRST: First occurrence (e.g., first Monday).
         - ORDINAL_SECOND: Second occurrence.
         - ORDINAL_THIRD: Third occurrence.
         - ORDINAL_FOURTH: Fourth occurrence.
         - ORDINAL_FIFTH: Fifth occurrence (not all months have a fifth occurrence of each day).
         - ORDINAL_LAST: Last occurrence (e.g., last Friday of month).
    v1ScheduleStart:
      type: object
      properties:
        start_date:
          $ref: "#/components/schemas/typeDate"
        time:
          $ref: "#/components/schemas/typeTimeOfDay"
        time_zone:
          type: string
          description: >-
            Timezone for the schedule. Defaults to "UTC" if not specified.

            Use IANA timezone identifiers (e.g., "America/New_York", "America/Los_Angeles", "Europe/London").
      description: ScheduleStart defines when the schedule begins.
    v1TimeWindow:
      type: object
      properties:
        start_time:
          type: string
          format: date-time
          description: The start time of the window (inclusive).
        end_time:
          type: string
          format: date-time
          description: The end time of the window (inclusive).
        time_zone:
          type: string
          description: >-
            The timezone for interpreting the time window.

            Format: IANA timezone identifier (e.g., "America/New_York", "Europe/London").

            Defaults to "UTC" if not specified.
      description: Time window for querying insights.
      required:
        - start_time
        - end_time
    v1RepeatInterval:
      type: object
      properties:
        unit:
          $ref: "#/components/schemas/v1FrequencyUnit"
        interval:
          type: integer
          format: int32
          description: >-
            The interval value. For example, 2 with FREQUENCY_UNIT_WEEK means
            "every 2 weeks".

            Must be a positive integer. Defaults to 1 if not specified.
      description: RepeatInterval defines how often the schedule repeats.
      required:
        - unit
    v1FrequencyUnit:
      type: string
      enum:
        - FREQUENCY_UNIT_UNSPECIFIED
        - FREQUENCY_UNIT_MINUTE
        - FREQUENCY_UNIT_HOUR
        - FREQUENCY_UNIT_DAY
        - FREQUENCY_UNIT_WEEK
        - FREQUENCY_UNIT_MONTH
        - FREQUENCY_UNIT_YEAR
      default: FREQUENCY_UNIT_UNSPECIFIED
      description: |-
        FrequencyUnit defines the unit for schedule repetition.

         - FREQUENCY_UNIT_UNSPECIFIED: Unspecified frequency unit.
         - FREQUENCY_UNIT_MINUTE: Schedule repeats every N minutes.
         - FREQUENCY_UNIT_HOUR: Schedule repeats every N hours.
         - FREQUENCY_UNIT_DAY: Schedule repeats every N days.
         - FREQUENCY_UNIT_WEEK: Schedule repeats every N weeks.
         - FREQUENCY_UNIT_MONTH: Schedule repeats every N months.
         - FREQUENCY_UNIT_YEAR: Schedule repeats every N years.
    v1MonthPattern:
      type: object
      properties:
        month:
          $ref: "#/components/schemas/v1Month"
        day_pattern:
          $ref: "#/components/schemas/v1DayOfMonthPattern"
      description: |-
        MonthPattern specifies which month and day to run.
        Used for yearly schedules (e.g., "July 30", "last Friday of December").
      required:
        - month
        - day_pattern
    v1Month:
      type: string
      enum:
        - MONTH_UNSPECIFIED
        - MONTH_JANUARY
        - MONTH_FEBRUARY
        - MONTH_MARCH
        - MONTH_APRIL
        - MONTH_MAY
        - MONTH_JUNE
        - MONTH_JULY
        - MONTH_AUGUST
        - MONTH_SEPTEMBER
        - MONTH_OCTOBER
        - MONTH_NOVEMBER
        - MONTH_DECEMBER
      default: MONTH_UNSPECIFIED
      description: |-
        Month represents months of the year.

         - MONTH_UNSPECIFIED: Unspecified month.
         - MONTH_JANUARY: January.
         - MONTH_FEBRUARY: February.
         - MONTH_MARCH: March.
         - MONTH_APRIL: April.
         - MONTH_MAY: May.
         - MONTH_JUNE: June.
         - MONTH_JULY: July.
         - MONTH_AUGUST: August.
         - MONTH_SEPTEMBER: September.
         - MONTH_OCTOBER: October.
         - MONTH_NOVEMBER: November.
         - MONTH_DECEMBER: December.
    v1CountExceptionsByAutomationResponse:
      type: object
      properties:
        automation_counts:
          type: array
          items:
            $ref: "#/components/schemas/v1ExceptionAutomationCount"
          description: Exception counts by automation.
        next_page_token:
          type: string
          description: |-
            Token to retrieve the next page of results.
            Empty when there are no more results.
        total_size:
          type: integer
          format: int32
          description: |-
            Total number of automations with exceptions (across all pages).
            Respects the filter from the request.
        total_exception_count:
          type: integer
          format: int32
          description: >-
            Total count of all exceptions across all automations.

            Respects the filter from the request.

            This is the sum of all counts in automation_counts (across all pages).

            Useful for displaying summary statistics like "500 total exceptions across 25 automations".
      description: Response containing exception counts by automation.
    v1ExceptionAutomationCount:
      type: object
      properties:
        automation:
          type: string
          title: >-
            The automation resource name.

            Format: organizations/{organization}/workspaces/{workspace}/automations/{automation}
        count:
          type: integer
          format: int32
          description: Number of exceptions for this automation.
      description: Exception count for a specific automation.
    v1ListDefaultInputsHistoryResponse:
      type: object
      properties:
        default_inputs_history_entries:
          type: array
          items:
            $ref: "#/components/schemas/v1DefaultInputsHistoryEntry"
          description: The history entries, ordered newest first.
        next_page_token:
          type: string
          description: Token for retrieving the next page. Empty if no more results.
      description: ListDefaultInputsHistoryResponse contains a paginated list of
        default input history entries.
    v1DefaultInputsHistoryEntry:
      type: object
      properties:
        default_inputs:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/commonV1Value"
          description: The default inputs snapshot at the time of this change.
          readOnly: true
        change_time:
          type: string
          format: date-time
          description: When this change was made.
          readOnly: true
        change_actor:
          type: string
          description: User ID of the person who made this change.
          readOnly: true
      description: DefaultInputsHistoryEntry represents a single default input change event.
    v2RetrieveBooksConnectionsResponse:
      type: object
