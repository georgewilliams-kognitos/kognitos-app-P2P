  "/api/v1/organizations/{organization_id}/workspaces/{workspace_id}/automations/{automation_id}/revisions":
    get:
      summary: List Automation Revisions
      operationId: ListAutomationRevisions
      responses:
        "200":
          description: A successful response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/v1ListAutomationRevisionsResponse"
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/rpcStatus"
      parameters:
        - name: organization_id
          in: path
          required: true
          schema:
            type: string
        - name: workspace_id
          in: path
          required: true
          schema:
            type: string
        - name: automation_id
          in: path
          required: true
          schema:
            type: string
        - name: page_size
          description: >-
            The maximum number of revisions to return in a single response.

            The service may return fewer than this value.

            If unspecified, at most 50 revisions will be returned.

            The maximum value is 1000; values above 1000 will be coerced to 1000.
          in: query
          required: false
          schema:
            type: integer
            format: int32
        - name: page_token
          description: >-
            A page token received from a previous `ListAutomationRevisions`
            call.

            Provide this to retrieve the subsequent page of results.
          in: query
          required: false
          schema:
            type: string
        - name: filter
          description: >-
            Filter expression to restrict results. Per AIP-160, this should be a

            filtering expression following the Common Expression Language (CEL) syntax.


            Supported fields for filtering:
              - `stage`: The automation revision stage (e.g., DRAFT, PUBLISHED)

            Example filters:
              - `stage = "DRAFT"` - Returns only draft revisions
              - `stage = "PUBLISHED"` - Returns only published revisions

            If not specified or passed null, all revisions will be returned for that automation.
          in: query
          required: false
          schema:
            type: string
      tags:
        - Automations
  "/api/v1/organizations/{organization_id}/workspaces/{workspace_id}/automations":
