    v1AutomationVisualization:
      type: object
      properties:
        name:
          type: string
          title: >-
            The resource name of the visualization.

            Format: organizations/{org}/workspaces/{ws}/automations/{automation}/visualization
        graph:
          $ref: "#/components/schemas/v1FlowGraph"
        automation_version:
          type: string
          description: >-
            The semantic version of the automation this visualization
            represents.

            Format: "major.0" (e.g., "1.0", "2.0", "3.0") - always a published version.

            This corresponds to the automation's published version at the time of generation.
          readOnly: true
        state:
          $ref: "#/components/schemas/v1VisualizationState"
        error_message:
          type: string
          description: |-
            Error message describing why generation failed.
            Only populated when state is VISUALIZATION_STATE_FAILED.
          readOnly: true
      description: >-
        AutomationVisualization represents a visual representation of an
        automation's execution flow.

        Visualizations are generated for published automation versions and stored as configurations

        for rendering in the UI. This is a singleton resource - each automation has exactly one visualization

        representing its latest published version.
    v1VisualizationState:
      type: string
      enum:
        - VISUALIZATION_STATE_UNSPECIFIED
        - VISUALIZATION_STATE_PENDING
        - VISUALIZATION_STATE_COMPLETED
        - VISUALIZATION_STATE_FAILED
      default: VISUALIZATION_STATE_UNSPECIFIED
      description: >-
        VisualizationState indicates the current state of visualization
        generation.

         - VISUALIZATION_STATE_UNSPECIFIED: Unspecified state.
         - VISUALIZATION_STATE_PENDING: Visualization generation is in progress.
         - VISUALIZATION_STATE_COMPLETED: Visualization generation completed successfully.
         - VISUALIZATION_STATE_FAILED: Visualization generation failed.
    v1FlowGraph:
      type: object
      properties:
        nodes:
          type: array
          items:
            $ref: "#/components/schemas/v1FlowNode"
          description: List of nodes representing steps in the automation flow.
        edges:
          type: array
          items:
            $ref: "#/components/schemas/v1FlowEdge"
          description: List of edges representing connections between nodes.
      description: >-
        FlowGraph represents the execution flow of an automation as a directed
        graph.

        The graph consists of nodes (representing steps) and edges (representing transitions).
    v1FlowEdge:
      type: object
      properties:
        source:
          type: string
          description: ID of the source node where the edge originates.
        target:
          type: string
          description: ID of the target node where the edge points.
        condition:
          type: string
          description: Optional condition label for the edge (e.g., "Yes", "No" for
            decision branches).
      description: FlowEdge represents a directed connection between two nodes.
    v1FlowNode:
      type: object
      properties:
        id:
          type: string
          description: Unique identifier for this node within the graph.
        label:
          type: string
          description: Human-readable label describing this step.
        type:
          $ref: "#/components/schemas/v1FlowNodeType"
      description: FlowNode represents a single step or decision point in the
        automation flow.
    v1FlowNodeType:
      type: string
      enum:
        - FLOW_NODE_TYPE_UNSPECIFIED
        - FLOW_NODE_TYPE_START
        - FLOW_NODE_TYPE_END
        - FLOW_NODE_TYPE_PROCESS
        - FLOW_NODE_TYPE_DECISION
        - FLOW_NODE_TYPE_INPUT
        - FLOW_NODE_TYPE_OUTPUT
      default: FLOW_NODE_TYPE_UNSPECIFIED
      description: >-
        FlowNodeType defines the different types of nodes in an automation flow.

         - FLOW_NODE_TYPE_UNSPECIFIED: Unspecified node type.
         - FLOW_NODE_TYPE_START: Start node - represents the beginning of the flow.
         - FLOW_NODE_TYPE_END: End node - represents the end of the flow.
         - FLOW_NODE_TYPE_PROCESS: Process node - represents a processing step.
         - FLOW_NODE_TYPE_DECISION: Decision node - represents a branching point (if-else conditions).
         - FLOW_NODE_TYPE_INPUT: Input node - represents an input action.
         - FLOW_NODE_TYPE_OUTPUT: Output node - represents an output action.
