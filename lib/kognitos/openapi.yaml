            type: integer
            format: int32
        - name: page_token
          description: >-
            A page token, received from a previous `ListOrganizationUsers` call.

            Provide this to retrieve the subsequent page.

            When paginating, all other parameters provided to `ListOrganizationUsers` must match

            the call that provided the page token.
          in: query
          required: false
          schema:
            type: string
        - name: filter
          description: >-
            Optional filter string following AIP-160 filtering standards.

            Supported filter fields:

            - `role`: Filter by role name (case-insensitive). Example: `role="Organization Admin"`

            - `role_scope`: Filter by role scope. Values: "organization" or "workspace". Example: `role_scope=organization`

            - `search`: Search by user display name or email (partial match). Example: `search:"john"`
          in: query
          required: false
          schema:
            type: string
        - name: order_by
          description: >-
            Optional comma-separated list of fields to order by, following
            AIP-132.

            Supported fields: display_name, email, created_time, updated_time

            Example: "display_name,created_time desc"

            Default ordering is by created_time descending if not specified.
          in: query
          required: false
          schema:
            type: string
      tags:
        - Organizations
