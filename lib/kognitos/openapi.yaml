        - TRIGGER_INSTANCE_STATE_FAILED
        - TRIGGER_INSTANCE_STATE_UNKNOWN
      default: TRIGGER_INSTANCE_STATE_PENDING
      title: Possible phases for a TriggerInstance (Pending, Ready, Failed, Unknown)
    v2RetrieveBookVersionsResponse:
      type: object
      properties:
        versions:
          type: array
          items:
            type: string
          title: All available versions for the specified book
    v1GenerateUploadUrlResponse:
      type: object
      properties:
        upload_uri:
          type: string
          title: Presigned upload URI
      title: Response with presigned upload URL
    v2SearchBooksResponse:
      type: object
      properties:
