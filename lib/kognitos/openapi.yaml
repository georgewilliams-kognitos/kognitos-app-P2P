    v1GuideEntry:
      type: object
      properties:
        name:
          type: string
          title: >-
            Resource name

            Format: organizations/{organization_id}/workspaces/{workspace_id}/automations/{automation_id}/guideEntries/{guide_entry_id}
        content:
          type: string
          description: |-
            Markdown-formatted entry content
            Deprecated: Use resolution_steps and resolution_code instead.
        source_exception:
          type: string
          title: Exception that led to this entry's creation
        source_run:
          type: string
          title: Run where this entry was first created
        create_time:
          type: string
          format: date-time
          title: Creation timestamp
          readOnly: true
        update_time:
          type: string
          format: date-time
          title: Last update timestamp
          readOnly: true
        delete_time:
          type: string
          format: date-time
          description: >-
            The time when this guide entry was soft-deleted.

            If not set, the entry has not been deleted.

            Soft-deleted entries are not physically removed but marked as deleted.

            Always set the state to STATE_ARCHIVED whenever the entry is soft-deleted.
          readOnly: true
        title:
          type: string
          description: |-
            Title of the guide entry
            Marked as optional for backwards compatibility.
            Can be set when creating or updating the guide entry.
        automation:
          type: string
          title: >-
            The automation that the guide entry belongs to.

            Format: organizations/{organization}/workspaces/{workspace}/automations/{automation}
          readOnly: true
        root_cause:
          type: string
          description: |-
            Root cause analysis explaining why the exception occurred.
            This provides technical context about what caused the issue.
            Marked as optional for backwards compatibility.
        state:
          $ref: "#/components/schemas/v1GuideEntryState"
        version:
          type: string
          title: >-
            Semantic version of this specific version of the guide entry
            (format: major.minor).

            Incremented each time the guide entry is updated.

            Examples: "0.1", "1.0", "1.1", "2.0"
          readOnly: true
        resolution_steps:
          type: string
          description: >-
            Human-readable explanation of the resolution action and steps.

            GitHub Flavored Markdown (GFM) formatted.


            Resolution Field Guidelines:

            - At least one of resolution_steps, resolution_code, or resolution_notes should be present
              for the guide entry to be useful. Entries with none of these fields are considered incomplete.
            - These fields are complementary and can be used together:
              - resolution_steps: The primary resolution instructions
              - resolution_code: Supporting code examples
              - resolution_notes: Additional context or caveats
        resolution_code:
          type: string
          description: >-
            Example code illustrating how this type of exception was resolved.

            Serves as a reference when handling similar exceptions in future runs.

            May require adaptation based on specific context and should not be applied verbatim.
        resolution_notes:
          type: string
          description: |-
            Additional notes, caveats, or context about the resolution.
            GitHub Flavored Markdown (GFM) formatted.
            Use for edge cases, warnings, or supplementary information.
      title: A troubleshooting guide entry for an automation
    v1GuideEntryState:
      type: string
      enum:
        - STATE_UNSPECIFIED
        - STATE_PENDING_APPROVAL
        - STATE_APPROVED
        - STATE_REJECTED
        - STATE_ARCHIVED
      default: STATE_UNSPECIFIED
      description: |-
        The state of a guide entry.

         - STATE_UNSPECIFIED: The state is not specified.
         - STATE_PENDING_APPROVAL: The guide entry is pending approval.
         - STATE_APPROVED: The guide entry is approved.
         - STATE_REJECTED: The guide entry is rejected.
         - STATE_ARCHIVED: The guide entry is archived.
